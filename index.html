<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>SCHNAIDER RACING</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; }
  canvas { display: block; }
  #hud {
    position: fixed; inset: 0; pointer-events: none;
    font-family: 'Courier New', monospace; color: #fff;
  }
  #brand {
    position: absolute; top: 24px; left: 30px;
    font-size: 11px; letter-spacing: 6px; opacity: 0.35; text-transform: uppercase;
  }
  #speedometer {
    position: absolute; bottom: 36px; right: 36px; text-align: right;
  }
  #spd {
    font-size: 60px; font-weight: bold; line-height: 1;
    text-shadow: 0 2px 24px rgba(0,0,0,0.9);
  }
  #unit { font-size: 11px; letter-spacing: 3px; opacity: 0.4; margin-top: 2px; }
  #hint {
    position: absolute; bottom: 36px; left: 50%; transform: translateX(-50%);
    font-size: 10px; letter-spacing: 2px; opacity: 0.25; white-space: nowrap;
  }
  #respawn-hint {
    position: absolute; top: 38%; left: 50%; transform: translate(-50%, -50%);
    color: #fff; font-family: 'Courier New', monospace; font-weight: bold;
    font-size: 16px; letter-spacing: 2px; text-align: center; line-height: 1.4;
    text-shadow: 0 2px 8px rgba(0, 0, 0, 0.85);
    opacity: 0; transition: opacity 0.18s ease-out;
    pointer-events: none; white-space: nowrap;
  }
  #respawn-hint.show { opacity: 1; }
  #respawn-hint .kb { display: inline; }
  #respawn-hint .tc { display: none; }
  body.touch #respawn-hint .kb { display: none; }
  body.touch #respawn-hint .tc { display: inline; }

  /* ── TOUCH CONTROLS — only shown on coarse pointer / no-hover devices ── */
  #touch-controls { display: none; pointer-events: none; }
  .tc-btn {
    pointer-events: auto;
    background: rgba(255, 255, 255, 0.06);
    border: 1.5px solid rgba(255, 255, 255, 0.30);
    color: rgba(255, 255, 255, 0.85);
    font-family: 'Courier New', monospace;
    font-weight: bold;
    user-select: none; -webkit-user-select: none; -webkit-tap-highlight-color: transparent;
    touch-action: none;
    backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center;
  }
  .tc-btn.pressed {
    background: rgba(255, 255, 255, 0.22);
    border-color: rgba(255, 255, 255, 0.65);
    color: #fff;
  }
  /* Steer pad: a horizontal slider track (bottom) + drift zone (top half).
     Slide finger left/right for analog steering. Slide UP into drift zone
     while still steering to engage handbrake (drift in current direction). */
  .tc-steer-pad {
    position: absolute; bottom: 16px; left: 12px; right: 12px;
    height: 132px;
    pointer-events: auto;
    user-select: none; -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
    touch-action: none;
  }
  .tc-drift-zone {
    position: absolute; top: 0; left: 0; right: 0; height: 56px;
    border: 1.5px dashed rgba(255, 180, 80, 0.45);
    border-radius: 14px;
    background: rgba(255, 180, 80, 0.04);
    backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center;
    color: rgba(255, 200, 100, 0.55);
    font-size: 10px; letter-spacing: 4px; font-weight: bold;
    font-family: 'Courier New', monospace;
  }
  .tc-drift-zone.pressed {
    background: rgba(255, 180, 80, 0.18);
    border-color: rgba(255, 200, 100, 0.85);
    color: rgba(255, 220, 150, 0.95);
  }
  .tc-steer-track {
    position: absolute; bottom: 0; left: 0; right: 0; height: 70px;
    border: 1.5px solid rgba(255, 255, 255, 0.30);
    border-radius: 35px;
    background: rgba(255, 255, 255, 0.06);
    backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
  }
  .tc-steer-knob {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 64px; height: 64px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.18);
    border: 2px solid rgba(255, 255, 255, 0.55);
    color: rgba(255, 255, 255, 0.7);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Courier New', monospace; font-size: 22px; font-weight: bold;
    pointer-events: none;
    transition: background 0.05s linear, border-color 0.05s linear;
  }
  .tc-steer-knob.pressed {
    background: rgba(255, 255, 255, 0.30);
    border-color: rgba(255, 255, 255, 0.85);
  }

  /* Three buttons spread along the row above the drift+steer pad.
     GAS isn't a button — it's implied by holding the steer slider. */
  .tc-actions {
    position: absolute; bottom: 156px; left: 16px; right: 16px;
    display: flex; justify-content: space-between; align-items: center;
    pointer-events: none;
  }
  .tc-actions .tc-btn { pointer-events: auto; font-size: 13px; letter-spacing: 1px; }
  .tc-actions [data-code='KeyE'] { width: 72px; height: 72px; border-radius: 50%; }
  .tc-actions [data-code='KeyS'] { width: 72px; height: 72px; border-radius: 50%;
    background: rgba(220, 80, 80, 0.10); border-color: rgba(220, 80, 80, 0.45); color: rgba(255,200,200,0.9); }
  .tc-actions [data-code='KeyQ'] { width: 96px; height: 60px; border-radius: 32px;
    background: rgba(255, 220, 100, 0.10); border-color: rgba(255, 220, 100, 0.5); color: rgba(255,240,200,0.95); }
  .tc-top {
    position: absolute; top: 16px; right: 16px;
    display: flex; gap: 7px;
  }
  .tc-top .tc-btn { padding: 0 12px; height: 32px; border-radius: 16px; font-size: 10px; letter-spacing: 1px; }

  @media (hover: none) and (pointer: coarse) {
    #touch-controls { display: block; }
    #hint { display: none; }
    #brand { display: none; }
    #speedometer { top: 14px; bottom: auto; left: 14px; right: auto; text-align: left; }
    #spd { font-size: 38px; }
    #unit { font-size: 9px; }
  }
  /* JS-flagged touch fallback (covers preview emulators that don't honour the media query) */
  body.touch #touch-controls { display: block; }
  body.touch #hint { display: none; }
  body.touch #brand { display: none; }
  body.touch #speedometer { top: 14px; bottom: auto; left: 14px; right: auto; text-align: left; }
  body.touch #spd { font-size: 38px; }
  body.touch #unit { font-size: 9px; }

</style>
</head>
<body>
<div id="hud">
  <div id="brand">SCHNAIDER / ARENA</div>
  <div id="speedometer">
    <div id="spd">0</div>
    <div id="unit">KM/H</div>
  </div>
  <div id="hint">W/↑ GAS &nbsp;·&nbsp; A/D STEER &nbsp;·&nbsp; SPACE HANDBRAKE &nbsp;·&nbsp; Q SHOOT &nbsp;·&nbsp; E JUMP &nbsp;·&nbsp; V CAMERA &nbsp;·&nbsp; M MUTE &nbsp;·&nbsp; R RESET</div>
  <div id="respawn-hint"><span class="kb">PRESS R TO RESPAWN<br>(−5 LEVELS)</span><span class="tc">TAP RESET TO RESPAWN<br>(−5 LEVELS)</span></div>
</div>

<div id="touch-controls">
  <div class="tc-top">
    <button class="tc-btn" data-code="KeyV" data-tap>CAM</button>
    <button class="tc-btn" data-code="Space">HB</button>
    <button class="tc-btn" data-code="KeyM" data-tap>MUTE</button>
    <button class="tc-btn" data-code="KeyR" data-tap>RESET</button>
  </div>
  <div class="tc-steer-pad" id="tc-steer-pad">
    <div class="tc-drift-zone" id="tc-drift-zone">DRIFT</div>
    <div class="tc-steer-track" id="tc-steer-track">
      <div class="tc-steer-knob" id="tc-steer-knob">⇆</div>
    </div>
  </div>
  <div class="tc-actions">
    <button class="tc-btn" data-code="KeyE">JUMP</button>
    <button class="tc-btn" data-code="KeyS">BRAKE</button>
    <button class="tc-btn" data-code="KeyQ">SHOOT</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script type="module">
import * as CANNON from './cannon-es.js';

// ── RENDERER ───────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// ── SCENE ──────────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x4a6891);
scene.fog = new THREE.FogExp2(0x4a6891, 0.007);

const camera = new THREE.PerspectiveCamera(68, window.innerWidth / window.innerHeight, 0.1, 500);

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ── LIGHTING ───────────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0xffffff, 0.5));

const sun = new THREE.DirectionalLight(0xfff8e8, 1.1);
sun.position.set(70, 110, 50);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.left = -150;
sun.shadow.camera.right = 150;
sun.shadow.camera.top = 150;
sun.shadow.camera.bottom = -150;
sun.shadow.camera.near = 1;
sun.shadow.camera.far = 350;
scene.add(sun);

// ── PHYSICS ────────────────────────────────────────────────────────────────
const world = new CANNON.World();
world.gravity.set(0, -18, 0);
world.broadphase = new CANNON.SAPBroadphase(world);
world.allowSleep = true;

const matGround = new CANNON.Material('ground');
const matWheel  = new CANNON.Material('wheel');
const matWall   = new CANNON.Material('wall');
const matBldg   = new CANNON.Material('bldg');

world.addContactMaterial(new CANNON.ContactMaterial(matWheel, matGround, {
  friction: 0.4, restitution: 0.1
}));
// Bouncy buildings vs perimeter walls — slam back when slid into wall
world.addContactMaterial(new CANNON.ContactMaterial(matBldg, matWall, {
  friction: 0.05, restitution: 0.85
}));
// Buildings vs each other — slight friction, low bounce
world.addContactMaterial(new CANNON.ContactMaterial(matBldg, matBldg, {
  friction: 0.3, restitution: 0.2
}));

// ── GROUND ─────────────────────────────────────────────────────────────────
const groundBody = new CANNON.Body({ mass: 0, material: matGround });
groundBody.addShape(new CANNON.Plane());
groundBody.quaternion.setFromEuler(-Math.PI / 2, 0, 0);
world.addBody(groundBody);

const groundMesh = new THREE.Mesh(
  new THREE.PlaneGeometry(400, 400),
  new THREE.MeshLambertMaterial({ color: 0x242424 })
);
groundMesh.rotation.x = -Math.PI / 2;
groundMesh.receiveShadow = true;
scene.add(groundMesh);

// Faint grid
const grid = new THREE.GridHelper(300, 50, 0x303030, 0x303030);
grid.position.y = 0.01;
scene.add(grid);

// ── HELPER: static box ────────────────────────────────────────────────────
function staticBox(x, y, z, w, h, d, color, mat) {
  const body = new CANNON.Body({ mass: 0, material: mat || null });
  body.addShape(new CANNON.Box(new CANNON.Vec3(w / 2, h / 2, d / 2)));
  body.position.set(x, y, z);
  world.addBody(body);

  const mesh = new THREE.Mesh(
    new THREE.BoxGeometry(w, h, d),
    new THREE.MeshLambertMaterial({ color: color || 0x556677 })
  );
  mesh.position.set(x, y, z);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  scene.add(mesh);
  return mesh;
}

// ── ARENA WALLS ────────────────────────────────────────────────────────────
const A = 78; // arena half-size (metres)
const WH = 5; // wall height
staticBox(  0, WH/2,  A, A*2+4, WH, 4, 0x404040, matWall);
staticBox(  0, WH/2, -A, A*2+4, WH, 4, 0x404040, matWall);
staticBox(  A, WH/2,  0, 4, WH, A*2+4, 0x404040, matWall);
staticBox( -A, WH/2,  0, 4, WH, A*2+4, 0x404040, matWall);

// ── RAMPS ──────────────────────────────────────────────────────────────────
// Standalone wedge jumps — no square buildings. 8 of them, varied size + yaw.
// Slope ratio rise:run kept ≤ 1:4 so cars hold most of their speed going up.
// Box bottom is sunk slightly into the ground so the leading edge isn't a wall.
const dynBuildings = []; // kept for the existing sync loop (now empty)

// Hills — Gaussian h(r) = peakH * exp(-r²/2σ²) revolved around the Y axis.
// Visual: smooth Lathe geometry. Physics: stack of truncated cones (Cylinder
// with different top/bottom radii) approximating the curve, because cannon-es
// Trimesh + RaycastVehicle wheels don't collide reliably.
const HILL_COLOR = 0x303030;
// Hills = huge half-buried spheres. Physics body really exists, but radius
// is so large that the visible cap has a gentle slope (~22-25°). Cars
// climb a bit slower than on the plane, but they don't grind to a stop.
// At speed: jump off the peak; slow: roll back down. Real physics, arcade
// feel because the geometry itself is forgiving.
function makeHill(x, z, sigma, peakH) {
  // Sphere physics: peak height H, radius R chosen so base slope ~24°
  const R       = peakH * 12;       // sphere radius
  const burial  = R - peakH;        // how deep the centre sits below ground
  const body = new CANNON.Body({ mass: 0, material: matBldg });
  body.addShape(new CANNON.Sphere(R));
  body.position.set(x, -burial, z);
  world.addBody(body);

  // Visual stays the smooth Gaussian lathe (it matches the sphere closely
  // enough near the centre; outer fringe slightly oversells the slope but
  // that just looks like the hill blends into the floor).
  const profile = [];
  const profSegs = 26;
  const totalR   = sigma * 3.2;
  for (let i = 0; i <= profSegs; i++) {
    const r = (i / profSegs) * totalR;
    const h = peakH * Math.exp(-(r * r) / (2 * sigma * sigma));
    profile.push(new THREE.Vector2(r, h));
  }
  const geom = new THREE.LatheGeometry(profile, 32);
  const mesh = new THREE.Mesh(
    geom,
    new THREE.MeshLambertMaterial({ color: HILL_COLOR, side: THREE.DoubleSide })
  );
  mesh.position.set(x, 0, z);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  scene.add(mesh);
}

// Stub kept for camera + sync — returns 0 since hills now have real physics.
function hillHeightAt() { return 0; }

// 8 hills — same colour as ground (let the cars be the only colour).
// Heights ×3 vs the previous spec for proper mounds.
// [x,    z,    sigma, peakH]
// Bigger spheres need more room — keep peaks modest (R = peak*12 base width
// ≈ peak*9, so a 3m hill is ~27m wide).
const hills = [
  [-55, -50,  4.0, 2.4],
  [ 55,  50,  5.0, 3.2],
  [-55,  50,  3.0, 1.8],
  [ 55, -50,  5.5, 3.5],
  [   0,  60,  4.0, 2.6],
  [   0, -60,  3.0, 2.0],
  [-30,    0,  3.0, 1.6],
  [ 30,    0,  3.5, 2.2],
];
hills.forEach(([x, z, sig, h]) => makeHill(x, z, sig, h));

// ── DYNAMIC OBJECTS ────────────────────────────────────────────────────────
const dynamics = [];

function dynBox(x, z, size, color) {
  const body = new CANNON.Body({ mass: 6 });
  body.addShape(new CANNON.Box(new CANNON.Vec3(size/2, size/2, size/2)));
  body.position.set(x, size/2 + 0.01, z);
  body.linearDamping = 0.05;
  body.angularDamping = 0.1;
  world.addBody(body);

  const mesh = new THREE.Mesh(
    new THREE.BoxGeometry(size, size, size),
    new THREE.MeshLambertMaterial({ color })
  );
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  scene.add(mesh);
  dynamics.push({ body, mesh });
}

function dynBarrel(x, z) {
  const body = new CANNON.Body({ mass: 10 });
  body.addShape(new CANNON.Cylinder(0.44, 0.44, 1.1, 10));
  body.position.set(x, 0.56, z);
  body.linearDamping = 0.05;
  body.angularDamping = 0.1;
  world.addBody(body);

  const mesh = new THREE.Mesh(
    new THREE.CylinderGeometry(0.44, 0.44, 1.1, 10),
    new THREE.MeshLambertMaterial({ color: 0x383838 })
  );
  mesh.castShadow = true;
  scene.add(mesh);
  dynamics.push({ body, mesh });
}

// Box clusters at cardinal + diagonal positions — all neutral grey, only cars carry colour
const BC = [0x363636, 0x3a3a3a, 0x3e3e3e, 0x424242];
const boxSpots = [
  [38,10],[38,-10],[-38,10],[-38,-10],
  [10,38],[-10,38],[10,-38],[-10,-38],
  [48,28],[48,-28],[-48,28],[-48,-28],
  [28,48],[-28,48],[28,-48],[-28,-48],
  [38,38],[-38,38],[38,-38],[-38,-38],
];
boxSpots.forEach(([x,z], i) => {
  dynBox(x,       z,       1.15, BC[i % BC.length]);
  dynBox(x + 0.1, z + 0.1, 1.15, BC[(i+2) % BC.length]);
  dynBox(x + 0.2, z + 0.2, 1.15, BC[(i+4) % BC.length]);
});

// Barrel pairs at corners of arena
[[55,42],[55,-42],[-55,42],[-55,-42],
 [42,55],[-42,55],[42,-55],[-42,-55]].forEach(([x,z]) => {
  dynBarrel(x,     z);
  dynBarrel(x+2.3, z);
});

// ── CAR FACTORY ────────────────────────────────────────────────────────────
function darkenHex(hex, f) {
  const r = Math.floor(((hex >> 16) & 255) * f);
  const g = Math.floor(((hex >>  8) & 255) * f);
  const b = Math.floor(( hex        & 255) * f);
  return (r << 16) | (g << 8) | b;
}

function defaultDesign(color) {
  return {
    bodyColor: color,
    bodyLength: 3.7, bodyHeight: 0.55, bodyWidth: 1.7,
    bodyLift: 0.28,
    cabinOffset: -0.25, cabinLength: 1.85, cabinHeight: 0.56, cabinWidth: 1.5,
    cabinPosition: 'center', // 'rear' | 'center' | 'front' | 'full'
    cabinSlopeFront: 0, cabinSlopeRear: 0, cabinSlopeSides: 0,
    convertible: false,
    headlightStyle: 'box',
    accessory: 'none',
    wheelScale: 1.0,
  };
}

// Headlight-style catalogue. `quad` = 4 lights (2 per side); rest are 1-2.
// `viz` builds the on-car mesh; `proj` builds the matching flying projectile.
const projMatLight = new THREE.MeshBasicMaterial({ color: 0xffffcc });
const HL = {
  // Single per-side
  box:           { quad: false, viz: () => new THREE.BoxGeometry(0.08, 0.17, 0.30), proj: () => new THREE.BoxGeometry(0.18, 0.36, 0.55) },
  'box-h':       { quad: false, viz: () => new THREE.BoxGeometry(0.08, 0.10, 0.34), proj: () => new THREE.BoxGeometry(0.18, 0.22, 0.62) },
  tall:          { quad: false, viz: () => new THREE.BoxGeometry(0.08, 0.32, 0.10), proj: () => new THREE.BoxGeometry(0.18, 0.62, 0.20) },
  round:         { quad: false, viz: () => new THREE.SphereGeometry(0.14, 12, 8),    proj: () => new THREE.SphereGeometry(0.22, 12, 10) },
  oval:          { quad: false,
                   viz:  () => { const g = new THREE.SphereGeometry(0.14, 14, 10); g.scale(0.6, 0.7, 1.7); return g; },
                   proj: () => { const g = new THREE.SphereGeometry(0.20, 14, 10); g.scale(0.6, 0.8, 2.0); return g; } },
  'pill-v':      { quad: false,
                   viz:  () => { const g = new THREE.SphereGeometry(0.13, 12, 10); g.scale(0.7, 1.7, 0.7); return g; },
                   proj: () => { const g = new THREE.SphereGeometry(0.18, 12, 10); g.scale(0.7, 1.8, 0.7); return g; } },
  // Single, centred (one light total)
  wide:          { quad: false, viz: () => new THREE.BoxGeometry(0.08, 0.09, 0.60), proj: () => new THREE.BoxGeometry(0.18, 0.20, 1.05) },
  // Quad (4 lights, 2 per side)
  split:         { quad: true,  viz: () => new THREE.BoxGeometry(0.08, 0.07, 0.18), proj: () => new THREE.BoxGeometry(0.16, 0.14, 0.32) },
  'split-tall':  { quad: true,  viz: () => new THREE.BoxGeometry(0.08, 0.16, 0.07), proj: () => new THREE.BoxGeometry(0.16, 0.28, 0.14) },
  'split-round': { quad: true,  viz: () => new THREE.SphereGeometry(0.08, 10, 8),   proj: () => new THREE.SphereGeometry(0.13, 10, 8) },
  'split-oval':  { quad: true,
                   viz:  () => { const g = new THREE.SphereGeometry(0.09, 12, 8); g.scale(0.7, 0.7, 1.6); return g; },
                   proj: () => { const g = new THREE.SphereGeometry(0.13, 12, 8); g.scale(0.7, 0.8, 1.8); return g; } },
};
const HL_KEYS = Object.keys(HL);

// Tapered-box geometry for cabins. `slope` values pull each top edge inward,
// so any combination of front/rear/side slopes yields a coherent trapezoidal
// cabin (pure box when all slopes = 0). Face windings are CCW viewed from
// outside so Three.js back-face culling renders the cabin correctly.
function makeTaperedCab(bw, bl, h, slopeFront, slopeRear, slopeLeft, slopeRight) {
  const bx = bl / 2, bz = bw / 2;
  const sf = Math.max(0, Math.min(bl * 0.45, slopeFront || 0));
  const sr = Math.max(0, Math.min(bl * 0.45, slopeRear  || 0));
  const sl = Math.max(0, Math.min(bz * 0.9,  slopeLeft  || 0));
  const sR = Math.max(0, Math.min(bz * 0.9,  slopeRight || 0));
  // Bottom corners (y=0)        Top corners (y=h, pulled inward by slopes)
  const v0 = [-bx, 0, -bz];      const v4 = [-bx + sr, h, -bz + sl];
  const v1 = [ bx, 0, -bz];      const v5 = [ bx - sf, h, -bz + sl];
  const v2 = [ bx, 0,  bz];      const v6 = [ bx - sf, h,  bz - sR];
  const v3 = [-bx, 0,  bz];      const v7 = [-bx + sr, h,  bz - sR];

  const positions = [];
  function quad(a, b, c, d) {
    positions.push(...a, ...b, ...c, ...a, ...c, ...d);
  }
  // Outward normals via right-hand rule on first three vertices
  quad(v0, v1, v2, v3);   // bottom  (-Y)
  quad(v4, v7, v6, v5);   // top     (+Y)
  quad(v0, v4, v5, v1);   // -Z side
  quad(v1, v5, v6, v2);   // +X (front, sloped if sf > 0)
  quad(v2, v6, v7, v3);   // +Z side
  quad(v3, v7, v4, v0);   // -X (rear, sloped if sr > 0)

  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  g.computeVertexNormals();
  return g;
}

function rebuildCarVisual(car) {
  const g = car.group;
  while (g.children.length) {
    const c = g.children[0];
    g.remove(c);
    if (c.geometry) c.geometry.dispose();
  }

  const p = car.design;

  // Body
  const body = new THREE.Mesh(
    new THREE.BoxGeometry(p.bodyLength, p.bodyHeight, p.bodyWidth),
    new THREE.MeshLambertMaterial({ color: p.bodyColor })
  );
  body.position.y = p.bodyLift;
  body.castShadow = true;
  g.add(body);

  // Cabin: convertible = just a windshield, otherwise a (possibly tapered) box
  const cabinBaseY = p.bodyLift + p.bodyHeight / 2;
  if (p.convertible) {
    const wsW = p.cabinWidth, wsH = 0.32, wsT = 0.06;
    const ws = new THREE.Mesh(
      new THREE.BoxGeometry(wsT, wsH, wsW),
      new THREE.MeshLambertMaterial({ color: 0x445566 })  // opaque — transparency caused z-fighting
    );
    ws.position.set(p.cabinOffset + p.cabinLength * 0.4, cabinBaseY + wsH / 2, 0);
    ws.rotation.z = -0.3;
    g.add(ws);
    // Tiny rollbar/headrest behind the windshield for shape
    const bar = new THREE.Mesh(
      new THREE.BoxGeometry(0.18, 0.22, p.cabinWidth * 0.6),
      new THREE.MeshLambertMaterial({ color: darkenHex(p.bodyColor, 0.45) })
    );
    bar.position.set(p.cabinOffset - p.cabinLength * 0.3, cabinBaseY + 0.11, 0);
    g.add(bar);
  } else {
    const cab = new THREE.Mesh(
      makeTaperedCab(
        p.cabinWidth, p.cabinLength, p.cabinHeight,
        p.cabinSlopeFront, p.cabinSlopeRear,
        p.cabinSlopeSides, p.cabinSlopeSides
      ),
      new THREE.MeshLambertMaterial({ color: darkenHex(p.bodyColor, 0.55) })
    );
    cab.position.set(p.cabinOffset, cabinBaseY, 0);
    cab.castShadow = true;
    g.add(cab);
  }

  // Headlights — driven by the HL catalogue so projectile shape always matches
  const hlMat  = new THREE.MeshBasicMaterial({ color: 0xffffcc });
  const hlDef  = HL[p.headlightStyle] || HL.box;
  const xFront = p.bodyLength / 2 + 0.02;
  const zSide  = p.bodyWidth / 2 - 0.25;
  const placeHL = (x, y, z) => {
    const hl = new THREE.Mesh(hlDef.viz(), hlMat);
    hl.position.set(x, y, z);
    g.add(hl);
  };
  if (p.headlightStyle === 'wide') {
    placeHL(xFront, p.bodyLift, 0);
  } else if (hlDef.quad) {
    [-zSide, zSide].forEach(z => {
      [-0.12, 0.12].forEach(yo => placeHL(xFront, p.bodyLift + yo, z));
    });
  } else {
    [-zSide, zSide].forEach(z => placeHL(xFront, p.bodyLift, z));
  }

  // Tail lights
  const tlMat = new THREE.MeshBasicMaterial({ color: 0xff2200 });
  const tlGeom = new THREE.BoxGeometry(0.08, 0.14, 0.25);
  [-zSide, zSide].forEach(z => {
    const tl = new THREE.Mesh(tlGeom, tlMat);
    tl.position.set(-p.bodyLength / 2 - 0.02, p.bodyLift, z);
    g.add(tl);
  });

  // Accessory
  const roofY = cabinBaseY + p.cabinHeight;
  if (p.accessory === 'spoiler') {
    const sp = new THREE.Mesh(
      new THREE.BoxGeometry(0.45, 0.08, p.bodyWidth - 0.1),
      new THREE.MeshLambertMaterial({ color: 0x222222 })
    );
    sp.position.set(-p.bodyLength / 2 + 0.25, p.bodyLift + p.bodyHeight / 2 + 0.45, 0);
    g.add(sp);
    [-0.55, 0.55].forEach(z => {
      const sup = new THREE.Mesh(
        new THREE.BoxGeometry(0.06, 0.45, 0.06),
        new THREE.MeshLambertMaterial({ color: 0x222222 })
      );
      sup.position.set(-p.bodyLength / 2 + 0.25, p.bodyLift + p.bodyHeight / 2 + 0.22, z);
      g.add(sup);
    });
  } else if (p.accessory === 'antenna') {
    const ant = new THREE.Mesh(
      new THREE.CylinderGeometry(0.025, 0.025, 0.85, 6),
      new THREE.MeshLambertMaterial({ color: 0x111111 })
    );
    ant.position.set(p.cabinOffset - p.cabinLength / 2 + 0.1, roofY + 0.4, p.cabinWidth / 2 - 0.1);
    g.add(ant);
  } else if (p.accessory === 'scoop') {
    const sc = new THREE.Mesh(
      new THREE.BoxGeometry(0.55, 0.18, 0.55),
      new THREE.MeshLambertMaterial({ color: 0x222222 })
    );
    sc.position.set(p.bodyLength / 2 - 0.85, p.bodyLift + p.bodyHeight / 2 + 0.09, 0);
    g.add(sc);
  } else if (p.accessory === 'roofbox') {
    const rb = new THREE.Mesh(
      new THREE.BoxGeometry(p.cabinLength * 0.7, 0.25, p.cabinWidth * 0.7),
      new THREE.MeshLambertMaterial({ color: 0x556677 })
    );
    rb.position.set(p.cabinOffset, roofY + 0.13, 0);
    g.add(rb);
  }
}

// ── LEVEL-BASED PARAMETRIC SYSTEM ─────────────────────────────────────────
// car.level is an unbounded integer (min 1). Each level unlocks visual
// features and shifts parameter ranges. Inspired by the parametric car
// generator at ~/komp/PROJECTS/Sketches/parametric_car_generator.html.
const PALETTES = [
  // [maxLevel, colours]
  [4,    [0x9b8b6f, 0x6e6048, 0x7a6d52, 0x8b5a3c, 0x4a4438, 0xa89a78, 0x5a5040]],   // jalopy/dull
  [12,   [0xc0392b, 0x27ae60, 0x2980b9, 0xe67e22, 0xeeeeee, 0x444444, 0xb0a890]],   // commuter
  [25,   [0xe63946, 0x457b9d, 0x2a9d8f, 0xe9c46a, 0xffffff, 0x222222, 0x6c5ce7]],   // standard
  [50,   [0x1a1a1a, 0xeeeeee, 0x2c3e50, 0x6d4c41, 0x424f4a, 0x0a3d62, 0x3d3d3d, 0x8d6e63]],  // exec
  [100,  [0xffd700, 0xff0033, 0xffffff, 0x000000, 0xff5500, 0x9b59b6, 0xff00ff, 0x00e5ff]],  // super
  [9999, [0x00fff7, 0xff00ff, 0xffd700, 0xc0c0c0, 0xff66ee, 0xfffeed, 0xfff7d6, 0x80ffaa, 0xff7f50]], // exotic
];

function rng(a, b) { return a + Math.random() * (b - a); }
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function lerp(a, b, t) { return a + (b - a) * t; }

function unlockedHeadlights(L) {
  if (L < 3)   return ['round'];
  if (L < 7)   return ['round', 'oval', 'box'];
  if (L < 14)  return ['round', 'oval', 'box', 'box-h', 'wide'];
  if (L < 25)  return ['round', 'oval', 'box', 'box-h', 'wide', 'tall', 'pill-v'];
  if (L < 45)  return ['round', 'oval', 'box', 'box-h', 'wide', 'tall', 'pill-v', 'split', 'split-round'];
  if (L < 80)  return ['oval', 'box', 'box-h', 'wide', 'tall', 'pill-v', 'split', 'split-round', 'split-tall', 'split-oval'];
  return HL_KEYS;
}
function unlockedAccessories(L) {
  if (L < 5)   return ['none'];
  if (L < 12)  return ['none', 'antenna'];
  if (L < 25)  return ['none', 'antenna', 'spoiler'];
  if (L < 45)  return ['none', 'antenna', 'spoiler', 'roofbox', 'scoop'];
  return ['none', 'antenna', 'spoiler', 'roofbox', 'scoop', 'spoiler'];
}
function unlockedCabinPositions(L) {
  if (L < 8)   return ['rear', 'center'];
  if (L < 20)  return ['rear', 'center', 'front'];
  if (L < 35)  return ['rear', 'center', 'front', 'full'];
  return ['rear', 'center', 'front', 'full', 'rear', 'center']; // weighted toward rear/center at high levels
}
function pickPalette(L) {
  return PALETTES.find(p => L <= p[0])[1];
}

function applyTier(car, level) {
  car.level = Math.max(1, level | 0);
  const L = car.level;
  const t = Math.min(1, (L - 1) / 50);   // 0..1, saturates at level 51
  const p = car.design;

  // Body proportions — get longer / lower / wider with level, plus some jitter
  p.bodyLength = lerp(2.9, 4.5, t)  + rng(-0.2, 0.2);
  p.bodyWidth  = lerp(1.50, 1.95, t) + rng(-0.05, 0.05);
  p.bodyHeight = lerp(0.46, 0.32, t) + rng(-0.06, 0.06);
  p.bodyLift   = lerp(0.22, 0.18, t) + rng(-0.03, 0.05);

  // Cabin position decides offset & length envelope
  p.cabinPosition = pick(unlockedCabinPositions(L));
  switch (p.cabinPosition) {
    case 'rear':
      p.cabinOffset = -p.bodyLength * 0.18 + rng(-0.05, 0.05);
      p.cabinLength = p.bodyLength * 0.38 + rng(0, 0.15);
      break;
    case 'center':
      p.cabinOffset = rng(-0.10, 0.05);
      p.cabinLength = p.bodyLength * 0.50 + rng(0, 0.15);
      break;
    case 'front':
      p.cabinOffset = p.bodyLength * 0.16 + rng(-0.05, 0.05);
      p.cabinLength = p.bodyLength * 0.38 + rng(0, 0.10);
      break;
    case 'full':
      p.cabinOffset = rng(-0.05, 0.05);
      p.cabinLength = p.bodyLength * 0.78;
      break;
  }
  p.cabinWidth = p.bodyWidth * (0.85 + Math.random() * 0.10);
  p.cabinHeight = p.cabinPosition === 'full'
    ? lerp(0.55, 0.85, t)
    : lerp(0.42, 0.58, t) + rng(-0.05, 0.10);

  // Cabin roof slopes — start unlocking around L=12, grow with level
  const slopeMax = Math.min(0.45, Math.max(0, (L - 12) / 60));
  p.cabinSlopeFront = (Math.random() < 0.55) ? Math.random() * slopeMax * p.cabinLength : 0;
  p.cabinSlopeRear  = (Math.random() < 0.45) ? Math.random() * slopeMax * p.cabinLength : 0;
  p.cabinSlopeSides = (Math.random() < 0.35) ? Math.random() * slopeMax * p.cabinWidth * 0.4 : 0;

  // Convertible (top off) — unlocks at L=30, low odds, climbs slowly
  p.convertible = L >= 30 && Math.random() < Math.min(0.22, (L - 30) / 250);

  // Wheel scale (visual only — physics radius stays at 0.37)
  p.wheelScale = lerp(0.78, 1.30, t) + rng(-0.04, 0.04);

  // Colour — full RGB-pipette chaos. 30% pure random, 70% from any curated
  // palette tier so dull/normal/neon all coexist regardless of level.
  if (Math.random() < 0.30) {
    p.bodyColor = Math.floor(Math.random() * 0xffffff);
  } else {
    const pool = PALETTES.flatMap(p => p[1]);
    p.bodyColor = pool[Math.floor(Math.random() * pool.length)];
  }
  p.headlightStyle = pick(unlockedHeadlights(L));
  p.accessory      = pick(unlockedAccessories(L));

  rebuildCarVisual(car);
  if (car.wheels) {
    const s = p.wheelScale;
    car.wheels.forEach(w => w.scale.set(s, s, s));
  }
}

// Damage: shooter +1 level (unbounded), victim -1 level (floor 1)
function damage(victim, attacker) {
  if (victim === attacker) return;
  applyTier(attacker, attacker.level + 1);
  if (victim.level <= 1) {
    // KO — victim is at the bottom; teleport away so it can't be farmed
    respawnCar(victim);
    Synth.respawn();
  } else {
    applyTier(victim, victim.level - 1);
  }
  updateBadges();
  Synth.mutate();
}

// ── LEVEL BADGES (white digit, yellow if leader) ──────────────────────────
function makeBadge() {
  const canvas = document.createElement('canvas');
  canvas.width = 256; canvas.height = 128;
  const ctx = canvas.getContext('2d');
  const tex = new THREE.CanvasTexture(canvas);
  tex.minFilter = THREE.LinearFilter;
  const sprite = new THREE.Sprite(new THREE.SpriteMaterial({
    map: tex, transparent: true, depthTest: false, depthWrite: false,
  }));
  sprite.scale.set(2.6, 1.3, 1);  // preserves 2:1 aspect of the canvas
  sprite.renderOrder = 999;
  scene.add(sprite);
  return { canvas, ctx, tex, sprite, key: '' };
}

function paintBadge(badge, level, isLeader) {
  const key = level + (isLeader ? 'Y' : 'W');
  if (badge.key === key) return;
  badge.key = key;
  const ctx = badge.ctx;
  const W = badge.canvas.width, H = badge.canvas.height;
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = isLeader ? '#ffd700' : '#ffffff';
  ctx.font = 'bold 110px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowColor = 'rgba(0,0,0,0.85)';
  ctx.shadowBlur = 10;
  ctx.fillText(String(level), W / 2, H / 2 + 4);
  ctx.shadowBlur = 0;
  badge.tex.needsUpdate = true;
}

function updateBadges() {
  // Leader = car(s) with the highest level. Their badge is yellow; others white.
  let maxLevel = -Infinity;
  for (const c of allCars) if (c.level > maxLevel) maxLevel = c.level;
  for (const c of allCars) paintBadge(c.badge, c.level, c.level === maxLevel);
}

function makeCar(px, pz, color) {
  // Physics chassis
  const chassis = new CANNON.Body({ mass: 650 });
  chassis.addShape(new CANNON.Box(new CANNON.Vec3(1.85, 0.32, 0.92)));
  chassis.position.set(px, 1.4, pz);
  chassis.linearDamping = 0.05;
  chassis.angularDamping = 0.6;
  world.addBody(chassis);

  // Visual group (filled by rebuildCarVisual)
  const group = new THREE.Group();
  scene.add(group);

  // RaycastVehicle
  const vehicle = new CANNON.RaycastVehicle({
    chassisBody: chassis,
    indexRightAxis: 2,
    indexUpAxis: 1,
    indexForwardAxis: 0,
  });

  // Friction high so steering bites; suspension soft+long for visible bounce
  const wBase = {
    radius: 0.37,
    directionLocal: new CANNON.Vec3(0, -1, 0),
    suspensionStiffness: 42,
    suspensionRestLength: 0.40,
    frictionSlip: 5.5,
    dampingRelaxation: 2.0,
    dampingCompression: 3.4,
    maxSuspensionForce: 220000,
    rollInfluence: 0.02,
    axleLocal: new CANNON.Vec3(0, 0, 1),
    maxSuspensionTravel: 0.50,
    customSlidingRotationalSpeed: -30,
    useCustomSlidingRotationalSpeed: true,
  };

  // FL, FR, RL, RR
  [[1.42, 0.92],[1.42, -0.92],[-1.42, 0.92],[-1.42, -0.92]].forEach(([fx, fz]) => {
    vehicle.addWheel({
      ...wBase,
      chassisConnectionPointLocal: new CANNON.Vec3(fx, 0, fz)
    });
  });

  vehicle.addToWorld(world);

  // Wheel meshes — tyre + hub disc on each side, grouped so updateWheelTransform spins them
  const tyreGeom = new THREE.CylinderGeometry(0.37, 0.37, 0.32, 20);
  tyreGeom.applyMatrix4(new THREE.Matrix4().makeRotationX(Math.PI / 2));
  const tyreMat = new THREE.MeshLambertMaterial({ color: 0x1a1a1a });

  const hubGeom = new THREE.CircleGeometry(0.22, 18);
  const hubMat  = new THREE.MeshLambertMaterial({ color: 0xbbbbbb });
  const innerHubGeom = new THREE.CircleGeometry(0.10, 14);
  const innerHubMat  = new THREE.MeshLambertMaterial({ color: 0x444444 });

  const wheels = vehicle.wheelInfos.map(() => {
    const wg = new THREE.Group();
    const tyre = new THREE.Mesh(tyreGeom, tyreMat);
    tyre.castShadow = true;
    wg.add(tyre);

    [0.165, -0.165].forEach((z, i) => {
      const hub = new THREE.Mesh(hubGeom, hubMat);
      hub.position.z = z;
      if (i === 1) hub.rotation.y = Math.PI;
      wg.add(hub);
      const inner = new THREE.Mesh(innerHubGeom, innerHubMat);
      inner.position.z = z + (i === 0 ? 0.001 : -0.001);
      if (i === 1) inner.rotation.y = Math.PI;
      wg.add(inner);
    });

    scene.add(wg);
    return wg;
  });

  const car = { vehicle, chassis, group, wheels, design: defaultDesign(color) };
  rebuildCarVisual(car);
  return car;
}

// ── CARS ───────────────────────────────────────────────────────────────────
const player = makeCar(0, -32, 0xe63946);
const aiCars = [
  makeCar( 5, -32, 0x457b9d),
  makeCar(-5, -32, 0x2a9d8f),
  makeCar( 2, -38, 0xe9c46a),
];
const allCars = [player, ...aiCars];

// ── AI ─────────────────────────────────────────────────────────────────────
const aiState = aiCars.map(() => ({
  steer: 0, stuckTime: 0, lastShot: 0, lastJump: 0, mode: 'chase', modeUntil: 0,
}));

// Everyone starts at level 1 (jalopy). Levels grow unboundedly via hits.
allCars.forEach(c => { c.level = 1; c.badge = makeBadge(); });
allCars.forEach(c => applyTier(c, 1));
updateBadges();

function respawnCar(car) {
  // Random spot inside arena, random heading
  const angle = Math.random() * Math.PI * 2;
  const r = 30 + Math.random() * 35;
  const x = Math.max(-A + 8, Math.min(A - 8, Math.cos(angle) * r));
  const z = Math.max(-A + 8, Math.min(A - 8, Math.sin(angle) * r));
  car.chassis.position.set(x, 2.5, z);
  car.chassis.velocity.set(0, 0, 0);
  car.chassis.angularVelocity.set(0, 0, 0);
  car.chassis.quaternion.setFromEuler(0, Math.random() * Math.PI * 2, 0);
  // If car is an AI, clear its stuck timer so it doesn't insta-respawn again
  const idx = aiCars.indexOf(car);
  if (idx >= 0) aiState[idx].stuckTime = 0;
}

function tickAI(car, state, dt, now) {
  const p = car.chassis.position;
  const vel = car.chassis.velocity;
  const spd = Math.sqrt(vel.x * vel.x + vel.z * vel.z);

  // Detect flipped (car's local up no longer points up)
  const upLocal = new CANNON.Vec3(0, 1, 0);
  const upWorld = new CANNON.Vec3();
  car.chassis.quaternion.vmult(upLocal, upWorld);
  const flipped = upWorld.y < 0.3;

  // Stuck timer: low speed for sustained period, or flipped
  if (flipped || spd < 1.2) state.stuckTime += dt;
  else state.stuckTime = 0;

  if (state.stuckTime > 2.2) {
    respawnCar(car);
    Synth.respawn();
    state.stuckTime = 0;
    state.mode = 'chase';
    return;
  }

  // Vector to player
  const tp = player.chassis.position;
  const dx = tp.x - p.x;
  const dz = tp.z - p.z;
  const dist = Math.max(0.1, Math.sqrt(dx * dx + dz * dz));

  // Mode switching: occasionally back off when too close (avoid pile-up)
  if (now > state.modeUntil) {
    if (state.mode === 'chase' && dist < 6 && Math.random() < 0.3) {
      state.mode = 'reverse';
      state.modeUntil = now + 700 + Math.random() * 600;
    } else if (state.mode === 'reverse') {
      state.mode = 'chase';
      state.modeUntil = now + 2000 + Math.random() * 2000;
    } else if (state.mode === 'chase' && Math.random() < 0.05) {
      // Brief flank — aim slightly off-target
      state.mode = 'flank';
      state.flankSign = Math.random() < 0.5 ? 1 : -1;
      state.modeUntil = now + 1200;
    } else if (state.mode === 'flank') {
      state.mode = 'chase';
      state.modeUntil = now + 1500;
    }
  }

  // Aim point depends on mode
  let aimX = dx, aimZ = dz;
  if (state.mode === 'flank') {
    // Aim 8m to the side of player
    const px = -dz / dist, pz = dx / dist; // perpendicular
    aimX = dx + px * 8 * state.flankSign;
    aimZ = dz + pz * 8 * state.flankSign;
  }

  const aimDist = Math.max(0.1, Math.sqrt(aimX * aimX + aimZ * aimZ));
  const tx = aimX / aimDist, tz = aimZ / aimDist;

  // Car forward vector
  const fwdLocal = new CANNON.Vec3(1, 0, 0);
  const fwd = new CANNON.Vec3();
  car.chassis.quaternion.vmult(fwdLocal, fwd);

  const cross = fwd.x * tz - fwd.z * tx;
  const dot   = fwd.x * tx + fwd.z * tz;

  let steerSign = state.mode === 'reverse' ? 1 : -1;
  let targetSteer = Math.max(-0.5, Math.min(0.5, steerSign * cross * 3));
  state.steer += (targetSteer - state.steer) * 0.2;

  let force = 4400;
  if (state.mode === 'reverse') force = -3500;
  else if (dot < -0.3) force = 1500;  // ease off when facing wrong way

  const fPer = force / 2;
  car.vehicle.applyEngineForce(fPer, 0);
  car.vehicle.applyEngineForce(fPer, 1);
  car.vehicle.applyEngineForce(fPer, 2);
  car.vehicle.applyEngineForce(fPer, 3);
  car.vehicle.setSteeringValue(state.steer, 0);
  car.vehicle.setSteeringValue(state.steer, 1);
  [0, 1, 2, 3].forEach(i => car.vehicle.setBrake(0, i));

  // Shooting: aimed at player + close enough + cooldown
  if (dist < 38 && dot > 0.65 && state.mode !== 'reverse'
      && now - state.lastShot > 900 + Math.random() * 700) {
    shoot(car);
    state.lastShot = now;
  }

  // Jumping: random with cooldown when moving forward at speed
  if (spd > 6 && state.mode === 'chase'
      && now - state.lastJump > 2200 + Math.random() * 2000) {
    car.chassis.applyImpulse(new CANNON.Vec3(0, 6800, 0), new CANNON.Vec3(0, 0, 0));
    Synth.jump();
    state.lastJump = now;
  }
}

// ── SYNTH ──────────────────────────────────────────────────────────────────
// Tiny Web-Audio synth. Every sound family steps through a fixed pattern of
// pitches, each with mild random jitter, so repeats become a melody-ish loop.
const Synth = (() => {
  const Ctx = window.AudioContext || window.webkitAudioContext;
  const ctx = new Ctx();
  const master = ctx.createGain();
  master.gain.value = 0.32;
  master.connect(ctx.destination);

  let muted = false;
  function setMute(v) {
    muted = v;
    master.gain.setTargetAtTime(v ? 0.0001 : 0.32, ctx.currentTime, 0.05);
  }
  function ensureRunning() {
    if (ctx.state === 'suspended') ctx.resume();
  }

  // Engine speed level (0..1) — drives the bass sequencer's loudness/cutoff
  let engineLevel = 0;
  function setEngine(speed) {
    engineLevel = Math.min(1, speed / 25);
  }

  // Generic short envelope blip with lowpass for muffled feel
  function blip({ freq, dur = 0.12, type = 'sine', cutoff = 800, vel = 0.25, sweep = 0, q = 0.7 }) {
    if (muted) return;
    ensureRunning();
    const t = ctx.currentTime;
    const osc = ctx.createOscillator();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t);
    if (sweep) osc.frequency.linearRampToValueAtTime(sweep, t + dur);
    const g = ctx.createGain();
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(vel, t + 0.006);
    g.gain.exponentialRampToValueAtTime(0.0005, t + dur);
    const f = ctx.createBiquadFilter();
    f.type = 'lowpass';
    f.frequency.value = cutoff;
    f.Q.value = q;
    osc.connect(f).connect(g).connect(master);
    osc.start(t);
    osc.stop(t + dur + 0.03);
  }

  // Patterns — each family advances through its sequence on every call
  const counters = {};
  function step(key, arr) {
    const i = (counters[key] || 0);
    counters[key] = i + 1;
    return arr[i % arr.length];
  }
  const J = () => 1 + (Math.random() - 0.5) * 0.04; // ±2% jitter
  const M = (m) => 440 * Math.pow(2, (m - 69) / 12); // MIDI → Hz

  // ── Popcorn — extracted directly from MIDI (Kingsley / Hot Butter, 1972).
  // Each entry = [dt-from-previous-ms, MIDI-pitch].  Tempo 147 BPM, 8th=204ms.
  const MEL = [[0,71],[204,69],[204,71],[204,66],[204,62],[204,66],[204,59],[408,71],[204,69],[204,71],[204,66],[204,62],[204,66],[204,59],[408,71],[204,73],[204,74],[204,73],[204,74],[204,71],[204,73],[204,71],[204,73],[204,69],[204,71],[204,69],[204,71],[204,67],[204,71],[408,71],[204,69],[204,71],[204,66],[204,62],[204,66],[204,59],[408,71],[204,69],[204,71],[204,66],[204,62],[204,66],[204,59],[408,71],[204,73],[204,74],[204,73],[204,74],[204,71],[204,73],[204,71],[204,73],[204,69],[204,71],[204,69],[204,71],[204,73],[204,74],[408,66],[204,64],[204,66],[204,62],[204,57],[204,62],[204,54],[408,66],[204,64],[204,66],[204,62],[204,57],[204,62],[204,54],[408,66],[204,68],[204,69],[204,68],[204,69],[204,66],[204,68],[204,66],[204,68],[204,64],[204,66],[204,64],[204,66],[204,62],[204,66],[408,66],[204,64],[204,66],[204,62],[204,57],[204,62],[204,54],[408,66],[204,64],[204,66],[204,62],[204,57],[204,62],[204,54],[408,66],[204,68],[204,69],[204,68],[204,69],[204,66],[204,68],[204,66],[204,68],[204,64],[204,66],[204,64],[204,66],[204,62],[204,66],[408,71],[204,69],[204,71],[204,66],[204,62],[102,66],[204,59],[102,59],[408,71],[204,69],[204,71],[204,66],[204,62],[102,66],[204,59],[510,71],[204,73],[204,74],[204,73],[102,74],[204,74],[102,71],[204,73],[204,71],[102,73],[204,73],[102,69],[204,71],[204,69],[102,71],[204,71],[102,69],[204,71],[408,71],[204,69],[204,71],[204,66],[204,62],[102,66],[204,59],[510,71],[204,69],[204,71],[204,66],[204,62],[102,66],[204,59],[510,71],[204,73],[204,74],[204,73],[102,74],[204,74],[102,71],[204,73],[204,71],[102,73],[204,73],[102,69],[204,71],[204,69],[102,71],[204,71],[102,73],[204,74],[408,66],[204,64],[204,66],[204,62],[204,57],[102,62],[204,54],[510,66],[204,64],[204,66],[204,62],[204,57],[102,62],[204,54],[510,66],[204,68],[204,69],[204,68],[102,69],[204,69],[102,66],[204,68],[204,66],[102,68],[204,68],[102,64],[204,66],[204,64],[102,66],[204,66],[102,62],[204,66],[408,66],[204,64],[204,66],[204,62],[204,57],[102,62],[204,54],[510,66],[204,64],[204,66],[204,62],[204,57],[102,62],[204,54],[510,66],[204,68],[204,69],[204,68],[102,69],[204,69],[102,66],[204,68],[204,66],[102,68],[204,68],[102,64],[204,66]];
  const BASS = [[0,35],[204,47],[102,42],[102,35],[204,47],[102,42],[102,35],[204,47],[102,42],[102,35],[102,39],[102,40],[102,42],[102,35],[204,47],[102,42],[102,35],[204,47],[102,42],[102,35],[204,47],[102,42],[102,35],[102,39]];

  // Triads from B-minor (the song's key) for chord stabs
  const CHORDS = [[59,62,66],[64,67,71],[66,69,73],[57,60,64],[62,66,69]].map(c => c.map(M));
  // Two-note rising chirps for jump
  const RISE = [[59,66],[62,69],[64,71],[57,64],[59,71]].map(p => p.map(M));
  // Falling drops for respawn
  const FALL = [[78,59],[76,57],[74,59],[71,55],[73,59]].map(p => p.map(M));

  // Bass loop — runs continuously, volume gated by engineLevel
  let bassIdx = 0;
  function bassTick() {
    const [, midi] = BASS[bassIdx];
    if (engineLevel > 0.04 && !muted && ctx.state === 'running') {
      const f = M(midi);
      blip({
        freq: f,
        dur: 0.16,
        type: 'sawtooth',
        cutoff: 280 + engineLevel * 500,
        vel: 0.06 + engineLevel * 0.18,
        q: 0.9,
      });
    }
    const nextIdx = (bassIdx + 1) % BASS.length;
    const dtNext = BASS[nextIdx][0];
    bassIdx = nextIdx;
    setTimeout(bassTick, dtNext);
  }
  setTimeout(bassTick, 50);  // kick off the loop after init

  let melIdx = 0;

  return {
    setEngine,
    setMute,
    isMuted: () => muted,
    ensureRunning,
    // Plays the next melody note in the Popcorn line, returns ms-until-next-note
    shoot() {
      const [, midi] = MEL[melIdx];
      const f = M(midi) * J();
      blip({ freq: f, dur: 0.09, type: 'square', cutoff: 1300, vel: 0.20, sweep: f * 0.93 });
      melIdx = (melIdx + 1) % MEL.length;
      return MEL[melIdx][0];  // dt of the next note
    },
    // Sub-bass thump on hit
    hit() {
      const f = M(36) * J();
      blip({ freq: f, dur: 0.22, type: 'sawtooth', cutoff: 260, vel: 0.40, sweep: f * 0.55, q: 1.2 });
    },
    jump() {
      const [a, b] = step('jump', RISE);
      blip({ freq: a * J(), dur: 0.10, type: 'square', cutoff: 1100, vel: 0.18 });
      setTimeout(() => blip({ freq: b * J(), dur: 0.14, type: 'square', cutoff: 1200, vel: 0.20 }), 70);
    },
    respawn() {
      const [a, b] = step('respawn', FALL);
      blip({ freq: a * J(), dur: 0.12, type: 'triangle', cutoff: 900, vel: 0.18 });
      setTimeout(() => blip({ freq: b * J(), dur: 0.22, type: 'triangle', cutoff: 700, vel: 0.20, sweep: b * 0.7 }), 80);
    },
    mutate() {
      const chord = step('mutate', CHORDS);
      chord.forEach((f, i) => {
        setTimeout(() => blip({ freq: f * J(), dur: 0.20, type: 'sine', cutoff: 1500, vel: 0.13 }), i * 38);
      });
    },
  };
})();

// ── PROJECTILES ────────────────────────────────────────────────────────────
const projectiles = [];

function makeProjectileMesh(style) {
  const def = HL[style] || HL.box;
  return new THREE.Mesh(def.proj(), projMatLight);
}

// For a given car, return the local-space spawn points of every headlight.
// Position matches what rebuildCarVisual draws so the projectile appears to
// detach from the actual headlight.
function headlightSpawns(car) {
  const p = car.design;
  const xFront = Math.max(p.bodyLength / 2 + 0.4, 2.4);
  const zSide  = p.bodyWidth / 2 - 0.25;
  const yBody  = p.bodyLift;
  const style  = p.headlightStyle;
  const def    = HL[style] || HL.box;
  const out = [];
  if (style === 'wide') {
    out.push({ pos: [xFront, yBody, 0], style });
  } else if (def.quad) {
    for (const z of [-zSide, zSide]) {
      for (const yo of [-0.12, 0.12]) {
        out.push({ pos: [xFront, yBody + yo, z], style });
      }
    }
  } else {
    for (const z of [-zSide, zSide]) {
      out.push({ pos: [xFront, yBody, z], style });
    }
  }
  return out;
}

function shoot(car) {
  // One melody note per shot (only audible when the player fires)
  const nextDt = (car === player) ? Synth.shoot() : 0;

  // Forward direction in world space
  const fwdLocal = new CANNON.Vec3(1, 0, 0);
  const fwd = new CANNON.Vec3();
  car.chassis.quaternion.vmult(fwdLocal, fwd);

  const baseSpeed = 55;
  for (const spawn of headlightSpawns(car)) {
    // Local → world for spawn position
    const localOff = new CANNON.Vec3(spawn.pos[0], spawn.pos[1], spawn.pos[2]);
    const worldOff = new CANNON.Vec3();
    car.chassis.quaternion.vmult(localOff, worldOff);

    const body = new CANNON.Body({ mass: 3 });
    body.addShape(new CANNON.Sphere(0.18));   // physics: simple sphere collider
    body.collisionFilterGroup = 2;            // projectile group
    body.collisionFilterMask  = -1 ^ 2;       // collide with everything EXCEPT other projectiles
    body.position.set(
      car.chassis.position.x + worldOff.x,
      car.chassis.position.y + worldOff.y,
      car.chassis.position.z + worldOff.z
    );
    body.linearDamping = 0;
    body.velocity.set(
      car.chassis.velocity.x + fwd.x * baseSpeed,
      car.chassis.velocity.y + 1.2,
      car.chassis.velocity.z + fwd.z * baseSpeed
    );
    world.addBody(body);

    // Visual: a copy of the headlight, oriented with the car at firing time
    const mesh = makeProjectileMesh(spawn.style);
    mesh.quaternion.copy(car.chassis.quaternion);
    scene.add(mesh);

    const proj = { body, mesh, life: 3, dead: false, owner: car };
    body.addEventListener('collide', (e) => {
      if (proj.dead) return;
      // Ignore brushes against the firing car itself (spawn-overlap on short
      // jalopy bodies, or self-overtake on a long projectile).
      if (e.body === car.chassis) return;
      let hitCar = false;
      for (const c of allCars) {
        if (e.body === c.chassis && c !== car) {
          damage(c, car);
          hitCar = true;
          break;
        }
      }
      if (hitCar) Synth.hit();
      proj.dead = true;
    });
    projectiles.push(proj);
  }
  return nextDt;
}

function updateProjectiles(dt) {
  for (let i = projectiles.length - 1; i >= 0; i--) {
    const p = projectiles[i];
    p.life -= dt;
    if (p.life <= 0 || p.dead) {
      world.removeBody(p.body);
      scene.remove(p.mesh);
      projectiles.splice(i, 1);
    } else {
      p.mesh.position.copy(p.body.position);
    }
  }
}

// ── INPUT ──────────────────────────────────────────────────────────────────
const K = {};
let camMode = 0;  // 0 chase · 1 chase-close · 2 below · 3 front-left · 4 front-right · 5 birds-eye
let nextShotTime = 0;
let lastJump = 0;

window.addEventListener('keydown', e => {
  K[e.code] = true;
  if (e.code === 'KeyR') resetPlayer();
  if (e.code === 'KeyV') camMode = (camMode + 1) % 6;
  if (e.code === 'KeyM') Synth.setMute(!Synth.isMuted());
  Synth.ensureRunning();
  const block = ['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight','KeyQ','KeyE','KeyV','KeyM'];
  if (block.includes(e.code)) e.preventDefault();
});
window.addEventListener('keyup', e => { K[e.code] = false; });

// Detect touch device — small viewport OR touch-capable. Adds body.touch class.
if ('ontouchstart' in window || navigator.maxTouchPoints > 0 || window.innerWidth <= 800) {
  document.body.classList.add('touch');
}

// ── TOUCH STEERING PAD — analog wheel + drift zone ────────────────────────
// touchSteer is null when finger is off the pad, else -1..+1 (analog).
// touchDrifting is true when the active touch sits inside the upper drift zone.
let touchSteer = null;
let touchDrifting = false;
const steerPadEl  = document.getElementById('tc-steer-pad');
const steerKnobEl = document.getElementById('tc-steer-knob');
const driftZoneEl = document.getElementById('tc-drift-zone');
const steerTrackEl = document.getElementById('tc-steer-track');

function readSteerTouch(clientX, clientY) {
  const padR   = steerPadEl.getBoundingClientRect();
  const trackR = steerTrackEl.getBoundingClientRect();
  // Steering value: based on X across the whole pad
  const knobR = 32;  // half of knob
  const usableW = trackR.width - knobR * 2;
  const x = clientX - trackR.left - knobR;
  let s = Math.max(-1, Math.min(1, x / (usableW / 2) - 1));
  // Easier centre: small dead zone
  if (Math.abs(s) < 0.06) s = 0;
  touchSteer = s;
  steerKnobEl.style.left = ((s * 0.5 + 0.5) * 100) + '%';
  // Drift zone: top portion of the pad (the dashed box). If finger is up there
  // the steering value is preserved AND handbrake engages.
  const localY = clientY - padR.top;
  touchDrifting = localY < 78;  // matches drift-zone height + small overlap
  driftZoneEl.classList.toggle('pressed', touchDrifting);
  steerKnobEl.classList.add('pressed');
}
function clearSteerTouch() {
  touchSteer = null;
  touchDrifting = false;
  steerKnobEl.style.left = '50%';
  steerKnobEl.classList.remove('pressed');
  driftZoneEl.classList.remove('pressed');
}
steerPadEl.addEventListener('touchstart', e => {
  e.preventDefault();
  Synth.ensureRunning();
  const t = e.touches[0];
  readSteerTouch(t.clientX, t.clientY);
}, { passive: false });
steerPadEl.addEventListener('touchmove', e => {
  e.preventDefault();
  // Find the touch that started on this pad — use the first one for simplicity
  const t = e.touches[0];
  readSteerTouch(t.clientX, t.clientY);
}, { passive: false });
steerPadEl.addEventListener('touchend', e => {
  e.preventDefault();
  if (e.touches.length === 0) clearSteerTouch();
}, { passive: false });
steerPadEl.addEventListener('touchcancel', clearSteerTouch);
// Mouse fallback for desktop testing
steerPadEl.addEventListener('mousedown', e => {
  e.preventDefault();
  Synth.ensureRunning();
  readSteerTouch(e.clientX, e.clientY);
  const onMove = ev => readSteerTouch(ev.clientX, ev.clientY);
  const onUp = () => {
    clearSteerTouch();
    window.removeEventListener('mousemove', onMove);
    window.removeEventListener('mouseup', onUp);
  };
  window.addEventListener('mousemove', onMove);
  window.addEventListener('mouseup', onUp);
});

// ── TOUCH CONTROLS ─────────────────────────────────────────────────────────
// Each .tc-btn has data-code matching a keyboard code. Hold-buttons set K[code]
// while pressed (matches keyboard); tap-buttons fire one-shot logic on press.
document.querySelectorAll('.tc-btn').forEach(btn => {
  const code = btn.dataset.code;
  const isTap = btn.hasAttribute('data-tap');
  const press = (e) => {
    e.preventDefault();
    btn.classList.add('pressed');
    Synth.ensureRunning();
    if (isTap) {
      if (code === 'KeyR') resetPlayer();
      else if (code === 'KeyV') camMode = (camMode + 1) % 6;
      else if (code === 'KeyM') Synth.setMute(!Synth.isMuted());
    } else {
      K[code] = true;
    }
  };
  const release = (e) => {
    if (e) e.preventDefault();
    btn.classList.remove('pressed');
    if (!isTap) K[code] = false;
  };
  btn.addEventListener('touchstart', press, { passive: false });
  btn.addEventListener('touchend', release, { passive: false });
  btn.addEventListener('touchcancel', release, { passive: false });
  btn.addEventListener('mousedown', press);
  btn.addEventListener('mouseup', release);
  btn.addEventListener('mouseleave', release);
  // Block context menu on long-press
  btn.addEventListener('contextmenu', e => e.preventDefault());
});

function resetPlayer() {
  // Manual respawn costs 5 levels (floor 1)
  applyTier(player, Math.max(1, player.level - 5));
  respawnCar(player);
  updateBadges();
  Synth.respawn();
}

// ── CAMERA STATE ───────────────────────────────────────────────────────────
const camPos = new THREE.Vector3(0, 9, -44);
const camLook = new THREE.Vector3(0, 1, -32);

// ── MAIN LOOP ──────────────────────────────────────────────────────────────
const MAX_FORCE = 6500;
const MAX_STEER = 0.47;

let prevTime = performance.now();

// ── GAMEPAD ────────────────────────────────────────────────────────────────
// Web Gamepad API: any Bluetooth/USB controller paired at OS level shows up
// here automatically. Mappings follow Xbox/standard layout. Polled each frame.
const G = { gas: false, brake: false, shoot: false, jump: false,
            steer: null, cam: false, mute: false, reset: false,
            prevCam: false, prevMute: false, prevReset: false };

function pollGamepad() {
  const list = navigator.getGamepads ? navigator.getGamepads() : [];
  let gp = null;
  for (const g of list) if (g) { gp = g; break; }
  if (!gp) {
    G.gas = G.brake = G.shoot = G.jump = false;
    G.steer = null;
    return;
  }
  const sx = gp.axes[0] || 0;
  G.steer = Math.abs(sx) > 0.10 ? sx : null;
  // Standard mapping: 0=A 1=B 2=X 3=Y 4=LB 5=RB 6=LT 7=RT 8=Back 9=Start
  G.gas    = (gp.buttons[7]?.value || 0) > 0.1 || gp.buttons[0]?.pressed;
  G.brake  = (gp.buttons[6]?.value || 0) > 0.1 || gp.buttons[1]?.pressed;
  G.shoot  = !!gp.buttons[5]?.pressed;
  G.jump   = !!gp.buttons[2]?.pressed;
  // One-shot buttons (camera/mute/reset) — fire on press edge
  const cam = !!gp.buttons[3]?.pressed;
  if (cam && !G.prevCam) camMode = (camMode + 1) % 6;
  G.prevCam = cam;
  const reset = !!gp.buttons[9]?.pressed;
  if (reset && !G.prevReset) resetPlayer();
  G.prevReset = reset;
  const mute = !!gp.buttons[8]?.pressed;
  if (mute && !G.prevMute) Synth.setMute(!Synth.isMuted());
  G.prevMute = mute;
  Synth.ensureRunning();
}

// Player stuck detection — flips, falls, or held against an obstacle for too long
const respawnHintEl = document.getElementById('respawn-hint');
let playerStuckTime = 0;
function updateStuckHint(dt) {
  const upLocal = new CANNON.Vec3(0, 1, 0);
  const upWorld = new CANNON.Vec3();
  player.chassis.quaternion.vmult(upLocal, upWorld);
  const flipped  = upWorld.y < 0.35;
  const fellOut  = player.chassis.position.y < -3;
  const v = player.chassis.velocity;
  const slow = Math.sqrt(v.x*v.x + v.y*v.y + v.z*v.z) < 0.6;
  const wantsToMove = K['KeyW'] || K['ArrowUp'] || K['KeyS'] || K['ArrowDown']
                      || (touchSteer !== null) || K['KeyQ'];
  const stalled = slow && wantsToMove;

  if (flipped || fellOut || stalled) playerStuckTime += dt;
  else playerStuckTime = 0;

  const show = flipped || fellOut || playerStuckTime > 1.6;
  respawnHintEl.classList.toggle('show', show);
}

function loop() {
  requestAnimationFrame(loop);

  const now = performance.now();
  const dt = Math.min((now - prevTime) / 1000, 0.05);
  prevTime = now;

  // ── Gamepad polling (BT/USB) ──────────────────────────────────────────
  pollGamepad();

  // ── Player input ──────────────────────────────────────────────────────
  const v = player.vehicle;
  let eng = 0, steer = 0;

  // On mobile / touch, holding STEER (slider), SHOOT, or DRIFT implies GAS so
  // one finger is enough. Gamepad gas works the same. Brake wins.
  const touchAssist = document.body.classList.contains('touch');
  const touchActiveDrive = touchAssist && (touchSteer !== null || K['KeyQ']);
  const wantGas = K['ArrowUp'] || K['KeyW'] || G.gas || touchActiveDrive;
  if (wantGas) {
    eng = MAX_FORCE;
  }
  if (K['ArrowDown'] || K['KeyS'] || G.brake) {
    const vel = player.chassis.velocity;
    const spd = Math.sqrt(vel.x*vel.x + vel.z*vel.z);
    eng = spd > 0.8 ? -MAX_FORCE * 0.55 : -MAX_FORCE * 0.28;
  }
  // Steer: gamepad analog wins, then touch slider, then keyboard
  const analogSteer = (G.steer !== null) ? G.steer
                    : (touchAssist && touchSteer !== null) ? touchSteer : null;
  if (analogSteer !== null) {
    steer = -analogSteer * MAX_STEER;
  } else {
    if (K['ArrowLeft']  || K['KeyA']) steer =  MAX_STEER;
    if (K['ArrowRight'] || K['KeyD']) steer = -MAX_STEER;
  }

  // 4WD — distribute torque so the chassis doesn't rear up under hard accel
  const ePer = eng / 2;
  v.applyEngineForce(ePer, 0);
  v.applyEngineForce(ePer, 1);
  v.applyEngineForce(ePer, 2);
  v.applyEngineForce(ePer, 3);
  v.setSteeringValue(steer, 0);
  v.setSteeringValue(steer, 1);

  const hb = (K['Space'] || (touchAssist && touchDrifting)) ? 85 : 0;
  v.setBrake(0,  0);
  v.setBrake(0,  1);
  v.setBrake(hb, 2);
  v.setBrake(hb, 3);

  // ── Shoot — fires at the Popcorn melody's tempo (8th=204ms, 16ths=102ms)
  if ((K['KeyQ'] || G.shoot) && now >= nextShotTime) {
    const dt = shoot(player);
    nextShotTime = now + (dt || 200);
  }

  // ── Engine sound (track player speed)
  Synth.setEngine(Math.sqrt(player.chassis.velocity.x ** 2 + player.chassis.velocity.z ** 2));

  // ── Jump / flip-righting ──────────────────────────────────────────────
  // Detect orientation each frame; if the car is on its side / roof, JUMP
  // instantly snaps it upright (keeping its yaw).  Otherwise normal hop.
  {
    const upL = new CANNON.Vec3(0, 1, 0);
    const upW = new CANNON.Vec3();
    player.chassis.quaternion.vmult(upL, upW);
    const tilted = upW.y < 0.55;

    // Slow auto-righting torque while tilted (GTA-style)
    if (tilted) {
      const target = new CANNON.Vec3(0, 1, 0);
      const axis = new CANNON.Vec3();
      upW.cross(target, axis);
      const k = 70;
      player.chassis.applyTorque(new CANNON.Vec3(axis.x * k, axis.y * k, axis.z * k));
    }

    if ((K['KeyE'] || G.jump) && now - lastJump > 800) {
      if (tilted) {
        // Snap upright preserving yaw + small upward boost
        const fwd = new CANNON.Vec3(1, 0, 0);
        const fwdW = new CANNON.Vec3();
        player.chassis.quaternion.vmult(fwd, fwdW);
        const yaw = Math.atan2(-fwdW.z, fwdW.x);
        player.chassis.quaternion.setFromEuler(0, yaw, 0);
        player.chassis.angularVelocity.set(0, 0, 0);
        player.chassis.position.y += 1.2;
        player.chassis.applyImpulse(new CANNON.Vec3(0, 3500, 0), new CANNON.Vec3(0, 0, 0));
      } else {
        player.chassis.applyImpulse(new CANNON.Vec3(0, 5000, 0), new CANNON.Vec3(0, 0, 0));
      }
      Synth.jump();
      lastJump = now;
    }
  }

  // ── AI ────────────────────────────────────────────────────────────────
  aiCars.forEach((car, i) => tickAI(car, aiState[i], dt, now));

  // ── Physics step ──────────────────────────────────────────────────────
  world.step(1 / 60, dt, 3);
  updateProjectiles(dt);
  updateStuckHint(dt);

  // ── Sync visuals — cars are physically on the flat floor; we lift their
  // visual + wheels by the hill profile at their XZ so they appear to ride
  // hills, while driving feel stays as effortless as on the plane.
  for (const car of allCars) {
    const lift = hillHeightAt(car.chassis.position.x, car.chassis.position.z);
    car.group.position.copy(car.chassis.position);
    car.group.position.y += lift;
    car.group.quaternion.copy(car.chassis.quaternion);
    car.vehicle.wheelInfos.forEach((info, i) => {
      car.vehicle.updateWheelTransform(i);
      car.wheels[i].position.copy(info.worldTransform.position);
      car.wheels[i].position.y += lift;
      car.wheels[i].quaternion.copy(info.worldTransform.quaternion);
    });
    if (car.badge) {
      car.badge.sprite.position.set(
        car.chassis.position.x,
        car.chassis.position.y + 2.6 + lift,
        car.chassis.position.z
      );
    }
  }
  for (const { body, mesh } of dynamics) {
    mesh.position.copy(body.position);
    mesh.quaternion.copy(body.quaternion);
  }
  for (const b of dynBuildings) {
    b.mesh.position.copy(b.body.position);
    b.mesh.quaternion.copy(b.body.quaternion);
    b.roof.position.set(b.body.position.x, b.body.position.y + b.roofYLocal, b.body.position.z);
  }

  // ── Camera (V cycles 6 modes) ─────────────────────────────────────────
  // 0 chase | 1 chase-close | 2 below-floor | 3 front-left | 4 front-right
  // 5 bird's-eye top-down (map rotates with player heading)
  const cp   = player.chassis.position;
  const cq   = player.chassis.quaternion;
  const cLift = hillHeightAt(cp.x, cp.z);
  const cpY   = cp.y + cLift;            // visual world-Y of the car

  if (camMode === 5) {
    // Top-down. Camera high above; player forward = screen up.
    const fwdL = new CANNON.Vec3(1, 0, 0);
    const fwdW = new CANNON.Vec3();
    cq.vmult(fwdL, fwdW);
    const ALT = 70;
    camPos.lerp(new THREE.Vector3(cp.x, cpY + ALT, cp.z), 0.15);
    camLook.lerp(new THREE.Vector3(cp.x, cpY, cp.z), 0.20);
    camera.position.copy(camPos);
    // Re-orient camera so player heading maps to screen up
    const upX = fwdW.x, upZ = fwdW.z;
    const len = Math.hypot(upX, upZ) || 1;
    camera.up.set(upX / len, 0, upZ / len);
    camera.lookAt(camLook);
  } else {
    camera.up.set(0, 1, 0);                // restore default up

    let localOff;
    if      (camMode === 0) localOff = new CANNON.Vec3(-7.8,  3.4,  0);   // chase
    else if (camMode === 1) localOff = new CANNON.Vec3(-4.2,  2.0,  0);   // chase close
    else if (camMode === 2) localOff = new CANNON.Vec3(-4.5, -1.6,  0);   // below floor
    else if (camMode === 3) localOff = new CANNON.Vec3( 4.5,  2.5, -3.5); // front-left
    else if (camMode === 4) localOff = new CANNON.Vec3( 4.5,  2.5,  3.5); // front-right

    const worldOff = new CANNON.Vec3();
    cq.vmult(localOff, worldOff);

    const lerpK = camMode === 0 ? 0.09 : 0.18;
    camPos.lerp(
      new THREE.Vector3(cp.x + worldOff.x, cpY + worldOff.y, cp.z + worldOff.z),
      lerpK
    );
    camLook.lerp(new THREE.Vector3(cp.x, cpY + 0.7, cp.z), lerpK + 0.04);

    camera.position.copy(camPos);
    camera.lookAt(camLook);
  }

  // ── HUD ───────────────────────────────────────────────────────────────
  const vel = player.chassis.velocity;
  const kmh = Math.round(Math.sqrt(vel.x*vel.x + vel.y*vel.y + vel.z*vel.z) * 3.6);
  document.getElementById('spd').textContent = kmh;

  renderer.render(scene, camera);
}

loop();
</script>
</body>
</html>
