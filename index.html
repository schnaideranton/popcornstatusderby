<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>SCHNAIDER RACING</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; }
  canvas { display: block; }
  #hud {
    position: fixed; inset: 0; pointer-events: none;
    font-family: 'Courier New', monospace; color: #fff;
  }
  #brand {
    position: absolute; top: 24px; left: 30px;
    font-size: 11px; letter-spacing: 6px; opacity: 0.35; text-transform: uppercase;
  }
  #speedometer {
    position: absolute; bottom: 36px; right: 36px; text-align: right;
  }
  #spd {
    font-size: 60px; font-weight: bold; line-height: 1;
    text-shadow: 0 2px 24px rgba(0,0,0,0.9);
  }
  #unit { font-size: 11px; letter-spacing: 3px; opacity: 0.4; margin-top: 2px; }
  #hint {
    position: absolute; bottom: 36px; left: 50%; transform: translateX(-50%);
    font-size: 10px; letter-spacing: 2px; opacity: 0.25; white-space: nowrap;
  }
  #respawn-hint {
    position: absolute; top: 38%; left: 50%; transform: translate(-50%, -50%);
    color: #fff; font-family: 'Courier New', monospace; font-weight: bold;
    font-size: 16px; letter-spacing: 2px; text-align: center; line-height: 1.4;
    text-shadow: 0 2px 8px rgba(0, 0, 0, 0.85);
    opacity: 0; transition: opacity 0.18s ease-out;
    pointer-events: none; white-space: nowrap;
  }
  #respawn-hint.show { opacity: 1; }
  #respawn-hint .kb { display: inline; }
  #respawn-hint .tc { display: none; }
  body.touch #respawn-hint .kb { display: none; }
  body.touch #respawn-hint .tc { display: inline; }
  #inspector-btn {
    position: absolute; top: 14px; left: 14px;
    color: #ddd; font-family: 'Courier New', monospace; font-size: 11px;
    letter-spacing: 2px; padding: 8px 14px; border-radius: 4px;
    background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.25);
    text-decoration: none; pointer-events: auto; z-index: 10;
  }
  #inspector-btn:hover { background: rgba(255,255,255,0.10); }
  body.touch #inspector-btn { display: none; }
  /* Spectator-camera tuning panel — visible only in cam mode 6. */
  #spec-tune {
    display: none; position: absolute; top: 14px; left: 50%;
    transform: translateX(-50%); padding: 10px 16px;
    background: rgba(0, 0, 0, 0.55); color: #ddd;
    font-family: 'Courier New', monospace; font-size: 11px;
    letter-spacing: 1.5px; border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.15); z-index: 6;
    pointer-events: auto;
  }
  #spec-tune { display: flex; gap: 16px; align-items: center; }
  #spec-tune.spec-active .spec-only { display: flex; }
  #spec-tune .spec-only { display: none; }
  #spec-tune label { display: flex; gap: 6px; align-items: center; }
  #spec-tune input[type=range] { width: 140px; }
  #spec-tune .v { width: 32px; text-align: right; opacity: 0.85; }
  /* Settings drawer + gear button. Default hidden — open via ⚙. */
  #gear-btn {
    position: absolute; top: 14px; right: 320px;
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(0,0,0,0.55); color: #ddd;
    border: 1px solid rgba(255,255,255,0.25);
    font-size: 18px; cursor: pointer; pointer-events: auto;
    z-index: 6; line-height: 32px; text-align: center;
  }
  #gear-btn:hover { background: rgba(255,255,255,0.10); }
  body.touch #gear-btn { display: none; }
  #settings-drawer {
    display: none; position: absolute; top: 60px; right: 14px;
    width: 320px; max-height: calc(100vh - 80px); overflow-y: auto;
    padding: 14px 16px; border-radius: 8px;
    background: rgba(0,0,0,0.78); color: #ddd;
    font-family: 'Courier New', monospace; font-size: 11px;
    letter-spacing: 1px;
    border: 1px solid rgba(255,255,255,0.20);
    z-index: 6; pointer-events: auto;
  }
  #settings-drawer.open { display: block; }
  #settings-drawer h3 {
    font-size: 10px; letter-spacing: 3px; opacity: 0.6;
    margin: 8px 0 6px; text-transform: uppercase; font-weight: normal;
  }
  #settings-drawer .row {
    display: grid; grid-template-columns: 80px 1fr 42px;
    gap: 6px; align-items: center; margin: 3px 0;
  }
  #settings-drawer .row label { opacity: 0.85; font-size: 10px; }
  #settings-drawer .row .v { text-align: right; font-size: 10px; opacity: 0.75; }
  #settings-drawer input[type=range] { width: 100%; }
  #settings-drawer select {
    background: #2a2d34; color: #ddd;
    border: 1px solid rgba(255,255,255,0.2);
    padding: 3px 5px; font-family: inherit; font-size: 11px;
    width: 100%; border-radius: 3px;
  }
  #settings-drawer button {
    width: 100%; margin-top: 8px;
    background: rgba(220,80,80,0.18);
    border: 1px solid rgba(220,80,80,0.55); color: #fcc;
    padding: 6px; border-radius: 4px;
    font-family: inherit; font-size: 10px; letter-spacing: 2px;
    cursor: pointer;
  }
  #settings-drawer button:hover { background: rgba(220,80,80,0.30); }
  /* Click target sitting on top of the iso preview — opens the constructor
     in a modal preloaded with the player's current design. */
  #preview-click {
    position: absolute; top: 14px; right: 14px;
    cursor: pointer; pointer-events: auto;
    border: 2px solid transparent; border-radius: 6px;
    transition: border-color 0.15s; z-index: 5;
  }
  #preview-click:hover { border-color: rgba(255,255,255,0.55); }
  body.touch #preview-click { display: none; }
  /* Inspector modal: covers the whole game while open. Game loop pauses. */
  #inspector-modal {
    display: none; position: fixed; inset: 0;
    background: rgba(8, 10, 14, 0.95); z-index: 1000;
  }
  #inspector-modal.open { display: block; }
  #inspector-iframe { width: 100%; height: 100%; border: none; display: block; }
  #inspector-resume {
    position: absolute; bottom: 18px; left: 50%; transform: translateX(-50%);
    background: rgba(120, 200, 140, 0.18);
    border: 1px solid rgba(120, 200, 140, 0.6); color: #cfe;
    font-family: 'Courier New', monospace; font-size: 13px; letter-spacing: 2px;
    padding: 12px 26px; border-radius: 6px; cursor: pointer; z-index: 1001;
  }
  #inspector-resume:hover { background: rgba(120, 200, 140, 0.32); }

  /* ── TOUCH CONTROLS — only shown on coarse pointer / no-hover devices ── */
  #touch-controls { display: none; pointer-events: none; }
  .tc-btn {
    pointer-events: auto;
    background: rgba(255, 255, 255, 0.06);
    border: 1.5px solid rgba(255, 255, 255, 0.30);
    color: rgba(255, 255, 255, 0.85);
    font-family: 'Courier New', monospace;
    font-weight: bold;
    user-select: none; -webkit-user-select: none; -webkit-tap-highlight-color: transparent;
    touch-action: none;
    backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center;
  }
  .tc-btn.pressed {
    background: rgba(255, 255, 255, 0.22);
    border-color: rgba(255, 255, 255, 0.65);
    color: #fff;
  }
  /* Steer pad: a horizontal slider track (bottom) + drift zone (top half).
     Slide finger left/right for analog steering. Slide UP into drift zone
     while still steering to engage handbrake (drift in current direction). */
  .tc-steer-pad {
    position: absolute; bottom: 16px; left: 12px; right: 12px;
    height: 132px;
    pointer-events: auto;
    user-select: none; -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
    touch-action: none;
  }
  .tc-drift-zone {
    position: absolute; top: 0; left: 0; right: 0; height: 56px;
    border: 1.5px dashed rgba(255, 180, 80, 0.45);
    border-radius: 14px;
    background: rgba(255, 180, 80, 0.04);
    backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center;
    color: rgba(255, 200, 100, 0.55);
    font-size: 10px; letter-spacing: 4px; font-weight: bold;
    font-family: 'Courier New', monospace;
  }
  .tc-drift-zone.pressed {
    background: rgba(255, 180, 80, 0.18);
    border-color: rgba(255, 200, 100, 0.85);
    color: rgba(255, 220, 150, 0.95);
  }
  .tc-steer-track {
    position: absolute; bottom: 0; left: 0; right: 0; height: 70px;
    border: 1.5px solid rgba(255, 255, 255, 0.30);
    border-radius: 35px;
    background: rgba(255, 255, 255, 0.06);
    backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
  }
  .tc-steer-knob {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 64px; height: 64px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.18);
    border: 2px solid rgba(255, 255, 255, 0.55);
    color: rgba(255, 255, 255, 0.7);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Courier New', monospace; font-size: 22px; font-weight: bold;
    pointer-events: none;
    transition: background 0.05s linear, border-color 0.05s linear;
  }
  .tc-steer-knob.pressed {
    background: rgba(255, 255, 255, 0.30);
    border-color: rgba(255, 255, 255, 0.85);
  }

  /* Three buttons spread along the row above the drift+steer pad.
     GAS isn't a button — it's implied by holding the steer slider. */
  .tc-actions {
    position: absolute; bottom: 156px; left: 16px; right: 16px;
    display: flex; justify-content: space-between; align-items: center;
    pointer-events: none;
  }
  .tc-actions .tc-btn { pointer-events: auto; font-size: 13px; letter-spacing: 1px; }
  .tc-actions [data-code='KeyE'] { width: 72px; height: 72px; border-radius: 50%; }
  .tc-actions [data-code='KeyS'] { width: 72px; height: 72px; border-radius: 50%;
    background: rgba(220, 80, 80, 0.10); border-color: rgba(220, 80, 80, 0.45); color: rgba(255,200,200,0.9); }
  .tc-actions [data-code='KeyQ'] { width: 96px; height: 60px; border-radius: 32px;
    background: rgba(255, 220, 100, 0.10); border-color: rgba(255, 220, 100, 0.5); color: rgba(255,240,200,0.95); }
  .tc-top {
    position: absolute; top: 16px; right: 16px;
    display: flex; gap: 7px;
  }
  .tc-top .tc-btn { padding: 0 12px; height: 32px; border-radius: 16px; font-size: 10px; letter-spacing: 1px; }

  @media (hover: none) and (pointer: coarse) {
    #touch-controls { display: block; }
    #hint { display: none; }
    #brand { display: none; }
    #speedometer { top: 14px; bottom: auto; left: 14px; right: auto; text-align: left; }
    #spd { font-size: 38px; }
    #unit { font-size: 9px; }
  }
  /* JS-flagged touch fallback (covers preview emulators that don't honour the media query) */
  body.touch #touch-controls { display: block; }
  body.touch #hint { display: none; }
  body.touch #brand { display: none; }
  body.touch #speedometer { top: 14px; bottom: auto; left: 14px; right: auto; text-align: left; }
  body.touch #spd { font-size: 38px; }
  body.touch #unit { font-size: 9px; }

</style>
</head>
<body>
<div id="hud">
  <div id="brand">SCHNAIDER / REAL-PROPORTION BUILD</div>
  <div id="speedometer">
    <div id="spd">0</div>
    <div id="unit">KM/H</div>
  </div>
  <div id="hint">W/↑ GAS &nbsp;·&nbsp; S/↓ BRAKE/REVERSE &nbsp;·&nbsp; A/D STEER &nbsp;·&nbsp; SPACE HANDBRAKE &nbsp;·&nbsp; Q SHOOT &nbsp;·&nbsp; E J-TURN &nbsp;·&nbsp; V CAMERA &nbsp;·&nbsp; M MUTE &nbsp;·&nbsp; R RESET</div>
  <div id="respawn-hint"><span class="kb">PRESS R TO RESPAWN<br>(−5 LEVELS)</span><span class="tc">TAP RESET TO RESPAWN<br>(−5 LEVELS)</span></div>
  <a id="inspector-btn" href="inspector.html" target="_blank" title="Open the car constructor in a new tab">
    🛠 CONSTRUCTOR
  </a>
  <div id="preview-click" title="Open this design in the constructor (game pauses)"></div>
  <button id="gear-btn" title="Tune cameras, sun, clouds, fog…">⚙</button>
  <div id="settings-drawer">
    <h3>Camera</h3>
    <div class="row"><label>Mode</label><select id="set-cam-mode">
      <option value="0">0 chase</option><option value="1">1 chase-close</option>
      <option value="2">2 below</option><option value="3">3 front-left</option>
      <option value="4">4 front-right</option><option value="5">5 birds-eye</option>
    </select><span class="v"></span></div>
    <div class="row"><label>X (fwd)</label><input type="range" id="set-cam-x" min="-15" max="15" step="0.1"/><span class="v" id="set-cam-x-v"></span></div>
    <div class="row"><label>Y (up)</label><input type="range" id="set-cam-y" min="-8" max="20" step="0.1"/><span class="v" id="set-cam-y-v"></span></div>
    <div class="row"><label>Z (right)</label><input type="range" id="set-cam-z" min="-12" max="12" step="0.1"/><span class="v" id="set-cam-z-v"></span></div>
    <div class="row"><label>Birds alt</label><input type="range" id="set-be" min="20" max="160" step="2"/><span class="v" id="set-be-v"></span></div>

    <h3>Sun &amp; sky</h3>
    <div class="row"><label>Sun pwr</label><input type="range" id="set-sun" min="0" max="3" step="0.05"/><span class="v" id="set-sun-v"></span></div>
    <div class="row"><label>Ambient</label><input type="range" id="set-amb" min="0" max="1.2" step="0.02"/><span class="v" id="set-amb-v"></span></div>
    <div class="row"><label>Sun X</label><input type="range" id="set-sx" min="-200" max="200" step="2"/><span class="v" id="set-sx-v"></span></div>
    <div class="row"><label>Sun Y</label><input type="range" id="set-sy" min="40" max="250" step="2"/><span class="v" id="set-sy-v"></span></div>
    <div class="row"><label>Sun Z</label><input type="range" id="set-sz" min="-200" max="200" step="2"/><span class="v" id="set-sz-v"></span></div>

    <h3>Clouds</h3>
    <div class="row"><label>Count</label><input type="range" id="set-cl-n" min="0" max="120" step="1"/><span class="v" id="set-cl-n-v"></span></div>
    <div class="row"><label>Altitude</label><input type="range" id="set-cl-h" min="20" max="180" step="2"/><span class="v" id="set-cl-h-v"></span></div>
    <div class="row"><label>Alt spread</label><input type="range" id="set-cl-as" min="0" max="120" step="2"/><span class="v" id="set-cl-as-v"></span></div>
    <div class="row"><label>Spread</label><input type="range" id="set-cl-sp" min="200" max="1400" step="20"/><span class="v" id="set-cl-sp-v"></span></div>
    <div class="row"><label>Size</label><input type="range" id="set-cl-sz" min="0.4" max="3" step="0.05"/><span class="v" id="set-cl-sz-v"></span></div>

    <h3>Track</h3>
    <div class="row"><label>Marking</label><input type="range" id="set-tr" min="1" max="10" step="0.5"/><span class="v" id="set-tr-v"></span></div>

    <button id="set-reset">↻ RESET DEFAULTS</button>
  </div>
  <div id="spec-tune">
    <label class="spec-only">HEIGHT <input id="spec-h" type="range" min="20" max="400" step="2"/><span class="v" id="spec-h-v"></span></label>
    <label class="spec-only">DIST   <input id="spec-d" type="range" min="20" max="500" step="2"/><span class="v" id="spec-d-v"></span></label>
    <label>FOG <input id="fog-d" type="range" min="0" max="0.020" step="0.0005"/><span class="v" id="fog-v"></span></label>
  </div>
</div>

<div id="inspector-modal">
  <iframe id="inspector-iframe" src="about:blank"></iframe>
  <button id="inspector-resume">▶ APPLY &amp; RESUME</button>
</div>

<div id="touch-controls">
  <div class="tc-top">
    <button class="tc-btn" data-code="KeyV" data-tap>CAM</button>
    <button class="tc-btn" data-code="Space">HB</button>
    <button class="tc-btn" data-code="KeyM" data-tap>MUTE</button>
    <button class="tc-btn" data-code="KeyR" data-tap>RESET</button>
  </div>
  <div class="tc-steer-pad" id="tc-steer-pad">
    <div class="tc-drift-zone" id="tc-drift-zone">DRIFT</div>
    <div class="tc-steer-track" id="tc-steer-track">
      <div class="tc-steer-knob" id="tc-steer-knob">⇆</div>
    </div>
  </div>
  <div class="tc-actions">
    <button class="tc-btn" data-code="KeyE">↺ FLIP</button>
    <button class="tc-btn" data-code="KeyS">BRAKE</button>
    <button class="tc-btn" data-code="KeyQ">SHOOT</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script type="module">
import * as CANNON from './cannon-es.js';

// ── RENDERER ───────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// ── SCENE ──────────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x4a6891);
// Fog disabled by default. Slider in the tuning panel can re-enable it.
scene.fog = new THREE.FogExp2(0x4a6891, 0);

const camera = new THREE.PerspectiveCamera(68, window.innerWidth / window.innerHeight, 0.1, 500);
// Mini camera — 3/4 profile of the player car, drawn in the top-right HUD
// during birds-eye mode so you can still see what your car looks like.
// Iso (orthographic) camera for the frozen preview — no fisheye, no perspective
// distortion, classic 3/4 hero shot. Frustum dimensions are reset every
// frame to match the on-screen aspect of the inset so the car never gets
// squashed.
const miniCam = new THREE.OrthographicCamera(-3.5, 3.5, 2.2, -2.2, 0.1, 60);

// ── ISO PREVIEW (always-on, frozen, top-right) ─────────────────────────────
// A clone of the player car visuals lives at y = +250 (above the arena),
// invisible to the main camera. We render it into a corner viewport with
// a fixed isometric camera so the player can always see what they drive.
const PREVIEW_Y = 250;
const previewGroup = new THREE.Group();
previewGroup.position.set(0, PREVIEW_Y, 0);
scene.add(previewGroup);
// (existing scene ambient + directional sun already light the previewGroup —
// DirectionalLight is direction-only and isn't affected by distance.)

// Preview wheels are simple unscaled cylinders matching the chassis offsets.
const previewTyreGeom = new THREE.CylinderGeometry(0.37, 0.37, 0.32, 18);
previewTyreGeom.rotateX(Math.PI / 2);
const previewTyreMat  = new THREE.MeshLambertMaterial({ color: 0x121214 });
const previewWheelOffsets = [[1.42, 0.92], [1.42, -0.92], [-1.42, 0.92], [-1.42, -0.92]];

function rebuildPlayerPreview() {
  while (previewGroup.children.length) previewGroup.remove(previewGroup.children[0]);
  rebuildCarVisual({ group: previewGroup, design: player.design });
  // Add four static wheels at the typical RaycastVehicle offsets.
  const s = player.design.wheelScale || 1;
  for (const [fx, fz] of previewWheelOffsets) {
    const w = new THREE.Mesh(previewTyreGeom, previewTyreMat);
    w.position.set(fx, -0.40, fz);
    w.scale.set(s, s, s);
    previewGroup.add(w);
  }
}

function fitToViewport() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}
window.addEventListener('resize', fitToViewport);
window.addEventListener('orientationchange', () => {
  // iOS reports the wrong size for a few frames after rotation — re-fit a bit later.
  setTimeout(fitToViewport, 100);
  setTimeout(fitToViewport, 400);
});

// ── LIGHTING ───────────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0xffffff, 0.55));
// Bright sunny day — sharp directional sun, low colour temp.
const sun = new THREE.DirectionalLight(0xfff5d4, 1.7);
sun.position.set(70, 130, 50);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.left = -150;
sun.shadow.camera.right = 150;
sun.shadow.camera.top = 150;
sun.shadow.camera.bottom = -150;
sun.shadow.camera.near = 1;
sun.shadow.camera.far = 350;
scene.add(sun);

// ── CLOUDS — regenerable puffy cumulus clusters ───────────────────────
let cloudGroup = new THREE.Group();
scene.add(cloudGroup);
const cloudMat = new THREE.MeshLambertMaterial({ color: 0xffffff });
function regenerateClouds(opts) {
  scene.remove(cloudGroup);
  cloudGroup.children.forEach(g => {
    g.children.forEach(m => m.geometry?.dispose());
  });
  cloudGroup = new THREE.Group();
  scene.add(cloudGroup);
  const N      = opts.count;
  const altMid = opts.altitude;
  const altSpread = opts.altSpread;
  const spread = opts.spread;
  const sizeMul = opts.size;
  for (let i = 0; i < N; i++) {
    const cluster = new THREE.Group();
    cluster.position.set(
      (Math.random() - 0.5) * spread,
      altMid + (Math.random() - 0.5) * altSpread,
      (Math.random() - 0.5) * spread
    );
    cluster.userData.seed = Math.random();          // unique morphology
    const puffs = 5 + Math.floor(Math.random() * 5);
    for (let j = 0; j < puffs; j++) {
      const r = (3 + Math.random() * 5) * sizeMul;
      const s = new THREE.Mesh(new THREE.SphereGeometry(r, 8, 6), cloudMat);
      s.position.set(
        (Math.random()-0.5) * 10 * sizeMul,
        (Math.random()-0.5) *  3 * sizeMul,
        (Math.random()-0.5) * 10 * sizeMul);
      s.scale.y = 0.55;
      cluster.add(s);
    }
    cloudGroup.add(cluster);
  }
}
const cloudOpts = {
  count:     parseInt(localStorage.getItem('cloudN'), 10)  || 30,
  altitude:  parseInt(localStorage.getItem('cloudH'), 10)  || 55,
  altSpread: parseInt(localStorage.getItem('cloudAS'), 10) || 30,
  spread:    parseInt(localStorage.getItem('cloudSP'), 10) || 700,
  size:      parseFloat(localStorage.getItem('cloudSZ'))   || 1.0,
};
regenerateClouds(cloudOpts);

// ── SKY background — bright daytime blue (swapped to floor-grey in
// birds-eye mode so the horizon disappears).

// Procedural canvas with abstract racing-track markings — curves,
// dashed centre lines, pit boxes, sweeping spline arcs, dashed turns.
// Tile repeats more so the markings read smaller next to the cars.
function makeTrackTexture() {
  const c = document.createElement('canvas');
  c.width = c.height = 2048;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#242424';
  ctx.fillRect(0, 0, 2048, 2048);
  // Helper
  const W = 'rgba(255,255,255,0.45)';
  const Wf = 'rgba(255,255,255,0.55)';
  // Outer track border (sweeping rounded square)
  ctx.strokeStyle = W; ctx.lineWidth = 6;
  ctx.beginPath();
  ctx.moveTo(280, 120);
  ctx.lineTo(1768, 120);
  ctx.quadraticCurveTo(1928, 120, 1928, 280);
  ctx.lineTo(1928, 1768);
  ctx.quadraticCurveTo(1928, 1928, 1768, 1928);
  ctx.lineTo(280, 1928);
  ctx.quadraticCurveTo(120, 1928, 120, 1768);
  ctx.lineTo(120, 280);
  ctx.quadraticCurveTo(120, 120, 280, 120);
  ctx.stroke();
  // Inner track border (mirrored, smaller)
  ctx.lineWidth = 6;
  ctx.beginPath();
  ctx.moveTo(380, 220);
  ctx.lineTo(1668, 220);
  ctx.quadraticCurveTo(1828, 220, 1828, 380);
  ctx.lineTo(1828, 1668);
  ctx.quadraticCurveTo(1828, 1828, 1668, 1828);
  ctx.lineTo(380, 1828);
  ctx.quadraticCurveTo(220, 1828, 220, 1668);
  ctx.lineTo(220, 380);
  ctx.quadraticCurveTo(220, 220, 380, 220);
  ctx.stroke();
  // Dashed mid line following the track
  ctx.setLineDash([42, 30]); ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(330, 170);
  ctx.lineTo(1718, 170);
  ctx.quadraticCurveTo(1878, 170, 1878, 330);
  ctx.lineTo(1878, 1718);
  ctx.quadraticCurveTo(1878, 1878, 1718, 1878);
  ctx.lineTo(330, 1878);
  ctx.quadraticCurveTo(170, 1878, 170, 1718);
  ctx.lineTo(170, 330);
  ctx.quadraticCurveTo(170, 170, 330, 170);
  ctx.stroke();
  ctx.setLineDash([]);
  // Two extra sweeping spline curves crossing the inner area
  ctx.lineWidth = 3; ctx.setLineDash([24, 18]);
  ctx.beginPath();
  ctx.moveTo(280, 1024);
  ctx.bezierCurveTo(680, 380, 1368, 1668, 1768, 1024);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(1024, 280);
  ctx.bezierCurveTo(380, 680, 1668, 1368, 1024, 1768);
  ctx.stroke();
  ctx.setLineDash([]);
  // Crosswalks (zebras) at 4 cardinal points on the outer border
  ctx.fillStyle = Wf;
  for (const [cx, cy, vert] of [
    [1024, 200, false], [1024, 1848, false],
    [200, 1024, true],  [1848, 1024, true]
  ]) {
    for (let i = 0; i < 14; i++) {
      const o = -260 + i * 38;
      if (vert) ctx.fillRect(cx - 24, cy + o, 48, 26);
      else      ctx.fillRect(cx + o, cy - 24, 26, 48);
    }
  }
  // Pit-stop boxes lining one side
  ctx.strokeStyle = Wf; ctx.lineWidth = 3;
  for (let i = 0; i < 6; i++) {
    ctx.strokeRect(290 + i * 240, 240, 60, 130);
  }
  // Dashed turn-radius circles (corners)
  ctx.setLineDash([18, 14]); ctx.lineWidth = 3;
  for (const [cx, cy, r] of [
    [380, 380, 220], [1668, 380, 220], [380, 1668, 220], [1668, 1668, 220]
  ]) {
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.stroke();
  }
  ctx.setLineDash([]);
  // Start/finish stripe
  ctx.fillStyle = 'rgba(255,255,255,0.45)';
  for (let i = 0; i < 16; i++) {
    if (i % 2 === 0) ctx.fillRect(990, 200 + i * 24, 28, 18);
    else             ctx.fillRect(1018, 200 + i * 24, 28, 18);
  }
  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.anisotropy = 4;
  return tex;
}

function staticBox(x, y, z, w, h, d, color, mat) {
  const body = new CANNON.Body({ mass: 0, material: mat || null });
  body.addShape(new CANNON.Box(new CANNON.Vec3(w / 2, h / 2, d / 2)));
  body.position.set(x, y, z);
  world.addBody(body);

  const mesh = new THREE.Mesh(
    new THREE.BoxGeometry(w, h, d),
    new THREE.MeshLambertMaterial({ color: color || 0x556677 })
  );
  mesh.position.set(x, y, z);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  scene.add(mesh);
  return mesh;
}

// Hills — Gaussian h(r) = peakH * exp(-r²/2σ²) revolved around the Y axis.
// Visual: smooth Lathe geometry. Physics: stack of truncated cones (Cylinder
// with different top/bottom radii) approximating the curve, because cannon-es
// Trimesh + RaycastVehicle wheels don't collide reliably.
const HILL_COLOR = 0x303030;
// Hills = huge half-buried spheres. Physics body really exists, but radius
// is so large that the visible cap has a gentle slope (~22-25°). Cars
// climb a bit slower than on the plane, but they don't grind to a stop.
// At speed: jump off the peak; slow: roll back down. Real physics, arcade
// feel because the geometry itself is forgiving.
// Hills are visual only — Gaussian lathe.  Cars never collide with them;
// instead, the visual position of each car (and the camera target) is
// lifted by the hill height at the car's XZ.  Result: smooth ride over
// any shape, no physics weirdness.  A peak-crossing impulse handles the
// "fly off the top" feel.
const HILLS = []; // { x, z, sigma, peakH }

function makeHill(x, z, sigma, peakH) {
  HILLS.push({ x, z, sigma, peakH });

  const profile = [];
  const segs = 26;
  const totalR = sigma * 3.2;
  for (let i = 0; i <= segs; i++) {
    const r = (i / segs) * totalR;
    const h = peakH * Math.exp(-(r * r) / (2 * sigma * sigma));
    profile.push(new THREE.Vector2(r, h));
  }
  const geom = new THREE.LatheGeometry(profile, 32);
  const mesh = new THREE.Mesh(
    geom,
    new THREE.MeshLambertMaterial({ color: HILL_COLOR, side: THREE.DoubleSide })
  );
  mesh.position.set(x, 0, z);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  scene.add(mesh);
}

function hillHeightAt(x, z) {
  let h = 0;
  for (const hl of HILLS) {
    const dx = x - hl.x, dz = z - hl.z;
    const r2 = dx * dx + dz * dz;
    const sig2 = hl.sigma * hl.sigma;
    const hh = hl.peakH * Math.exp(-r2 / (2 * sig2));
    if (hh > h) h = hh;
  }
  return h;
}

function darkenHex(hex, f) {
  const r = Math.floor(((hex >> 16) & 255) * f);
  const g = Math.floor(((hex >>  8) & 255) * f);
  const b = Math.floor(( hex        & 255) * f);
  return (r << 16) | (g << 8) | b;
}

// Tapered-box geometry for cabins. `slope` values pull each top edge inward,
// so any combination of front/rear/side slopes yields a coherent trapezoidal
// cabin (pure box when all slopes = 0). Face windings are CCW viewed from
// outside so Three.js back-face culling renders the cabin correctly.
function makeTaperedCab(bw, bl, h, slopeFront, slopeRear, slopeLeft, slopeRight) {
  const bx = bl / 2, bz = bw / 2;
  const sf = Math.max(0, Math.min(bl * 0.45, slopeFront || 0));
  const sr = Math.max(0, Math.min(bl * 0.45, slopeRear  || 0));
  const sl = Math.max(0, Math.min(bz * 0.9,  slopeLeft  || 0));
  const sR = Math.max(0, Math.min(bz * 0.9,  slopeRight || 0));
  // Bottom corners (y=0)        Top corners (y=h, pulled inward by slopes)
  const v0 = [-bx, 0, -bz];      const v4 = [-bx + sr, h, -bz + sl];
  const v1 = [ bx, 0, -bz];      const v5 = [ bx - sf, h, -bz + sl];
  const v2 = [ bx, 0,  bz];      const v6 = [ bx - sf, h,  bz - sR];
  const v3 = [-bx, 0,  bz];      const v7 = [-bx + sr, h,  bz - sR];

  const positions = [];
  function quad(a, b, c, d) {
    positions.push(...a, ...b, ...c, ...a, ...c, ...d);
  }
  // Outward normals via right-hand rule on first three vertices
  quad(v0, v1, v2, v3);   // bottom  (-Y)
  quad(v4, v7, v6, v5);   // top     (+Y)
  quad(v0, v4, v5, v1);   // -Z side
  quad(v1, v5, v6, v2);   // +X (front, sloped if sf > 0)
  quad(v2, v6, v7, v3);   // +Z side
  quad(v3, v7, v4, v0);   // -X (rear, sloped if sr > 0)

  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  g.computeVertexNormals();
  return g;
}

// Rounded box (corners eaten inward, outer L×H×W preserved). Tessellated
// box → vertex projection onto the rounded-box surface.
function makeRoundedBoxGeom(L, H, W, r) {
  r = Math.min(r, L * 0.49, H * 0.49, W * 0.49);
  if (r <= 0.001) return new THREE.BoxGeometry(L, H, W);
  const segs = 10;
  const geom = new THREE.BoxGeometry(L, H, W, segs, segs, segs);
  const pos  = geom.attributes.position;
  const ix = L / 2 - r, iy = H / 2 - r, iz = W / 2 - r;
  const v = new THREE.Vector3(), inner = new THREE.Vector3(), dir = new THREE.Vector3();
  for (let i = 0; i < pos.count; i++) {
    v.fromBufferAttribute(pos, i);
    inner.set(
      Math.max(-ix, Math.min(ix, v.x)),
      Math.max(-iy, Math.min(iy, v.y)),
      Math.max(-iz, Math.min(iz, v.z)));
    dir.subVectors(v, inner);
    if (dir.lengthSq() > 1e-8) {
      dir.normalize().multiplyScalar(r);
      v.copy(inner).add(dir);
      pos.setXYZ(i, v.x, v.y, v.z);
    }
  }
  pos.needsUpdate = true;
  geom.computeVertexNormals();
  return geom;
}

// Cabin with rounded top + roof-to-side bevel; bottom face stays perfectly
// flat (rounding factor fades to zero at the bottom). Slopes (sf, sr)
// applied as a top-X taper after rounding.
function makeRoundedCabGeom(bw, bl, h, sf, sr, roundTop) {
  const rMax = Math.min(roundTop, bl * 0.49, h * 0.49, bw * 0.49);
  if (rMax <= 0.001) return makeTaperedCab(bw, bl, h, sf, sr, 0, 0);
  const segs = 10;
  const geom = new THREE.BoxGeometry(bl, h, bw, segs, segs, segs);
  const pos  = geom.attributes.position;
  const v = new THREE.Vector3(), inner = new THREE.Vector3(), dir = new THREE.Vector3();
  for (let i = 0; i < pos.count; i++) {
    v.fromBufferAttribute(pos, i);
    const yNorm = (v.y + h / 2) / h;
    const rf    = Math.max(0, Math.min(1, yNorm * 2 - 0.1));
    const r     = rMax * rf;
    if (r > 0.001) {
      const ix = bl / 2 - r, iy = h / 2 - r, iz = bw / 2 - r;
      inner.set(
        Math.max(-ix, Math.min(ix, v.x)),
        Math.max(-iy, Math.min(iy, v.y)),
        Math.max(-iz, Math.min(iz, v.z)));
      dir.subVectors(v, inner);
      if (dir.lengthSq() > 1e-8) {
        dir.normalize().multiplyScalar(r);
        v.copy(inner).add(dir);
      }
    }
    const yt = Math.max(0, Math.min(1, (v.y + h / 2) / h));
    if (v.x > 0) v.x = Math.max(0, v.x - yt * sf);
    else         v.x = Math.min(0, v.x + yt * sr);
    pos.setXYZ(i, v.x, v.y, v.z);
  }
  pos.needsUpdate = true;
  geom.translate(0, h / 2, 0);
  geom.computeVertexNormals();
  return geom;
}

function rebuildCarVisual(car) {
  const g = car.group;
  while (g.children.length) {
    const c = g.children[0];
    g.remove(c);
    if (c.geometry) c.geometry.dispose();
  }

  const p = car.design;

  // Body — bodyLift is the BOTTOM of the body (chassis-local Y).
  const body = new THREE.Mesh(
    makeRoundedBoxGeom(p.bodyLength, p.bodyHeight, p.bodyWidth, p.bodyRound || 0),
    new THREE.MeshLambertMaterial({ color: p.bodyColor })
  );
  body.position.y = p.bodyLift + p.bodyHeight / 2;
  body.castShadow = true;
  g.add(body);

  const cabinBaseY = p.bodyLift + p.bodyHeight;
  const bodyCenterY = p.bodyLift + p.bodyHeight / 2;
  const bodyTopY = cabinBaseY;

  if (p.convertible) {
    const wsW = p.cabinWidth, wsH = 0.32, wsT = 0.06;
    const ws = new THREE.Mesh(
      new THREE.BoxGeometry(wsT, wsH, wsW),
      new THREE.MeshLambertMaterial({ color: 0x445566 })
    );
    ws.position.set(p.cabinOffset + p.cabinLength * 0.4, cabinBaseY + wsH / 2, 0);
    ws.rotation.z = 0.3;            // backwards rake — physically correct
    g.add(ws);
    const bar = new THREE.Mesh(
      new THREE.BoxGeometry(0.18, 0.22, p.cabinWidth * 0.6),
      new THREE.MeshLambertMaterial({ color: darkenHex(p.bodyColor, 0.45) })
    );
    bar.position.set(p.cabinOffset - p.cabinLength * 0.3, cabinBaseY + 0.11, 0);
    g.add(bar);
  } else {
    const effCabW = Math.min(p.cabinWidth, p.bodyWidth - 0.04);
    const cabGeom = (p.cabinRound > 0.001)
      ? makeRoundedCabGeom(effCabW, p.cabinLength, p.cabinHeight,
                           p.cabinSlopeFront, p.cabinSlopeRear, p.cabinRound)
      : makeTaperedCab(effCabW, p.cabinLength, p.cabinHeight,
                       p.cabinSlopeFront, p.cabinSlopeRear,
                       p.cabinSlopeSides, p.cabinSlopeSides);
    const cab = new THREE.Mesh(
      cabGeom,
      new THREE.MeshLambertMaterial({ color: darkenHex(p.bodyColor, 0.55) })
    );
    cab.position.set(p.cabinOffset, cabinBaseY + (p.cabinSink || 0), 0);
    cab.castShadow = true;
    g.add(cab);
  }

  // Headlights
  const hlMat  = new THREE.MeshBasicMaterial({ color: 0xffffcc });
  const hlDef  = HL[p.headlightStyle] || HL.box;
  const xFront = p.bodyLength / 2 + 0.01 + (p.headlightX || 0);
  const hlBaseY = bodyCenterY + (p.headlightY || 0);
  // Per-style half-Z extent (so we can clamp the OUTER edge of a round / oval /
  // box light to the body silhouette + 5%, instead of the centre).
  const HL_HALFZ = {
    box:0.15, 'box-h':0.17, tall:0.05, round:0.14, oval:0.119, 'pill-v':0.0455,
    wide:0.30, split:0.09, 'split-tall':0.035, 'split-round':0.08, 'split-oval':0.072,
  };
  const halfZ = (HL_HALFZ[p.headlightStyle] || 0.15) * (p.headlightW || 1);
  const maxOuter = p.bodyWidth / 2 + p.bodyWidth * 0.05;
  const zSideHLraw = Math.max(0.05, p.bodyWidth / 2 - 0.25 + (p.headlightSpread || 0));
  const zSideHL = Math.min(zSideHLraw, maxOuter - halfZ);
  const placeHL = (x, y, z) => {
    const hl = new THREE.Mesh(hlDef.viz(), hlMat);
    hl.position.set(x, y, z);
    hl.scale.set(1, p.headlightH || 1, p.headlightW || 1);
    g.add(hl);
  };
  if (p.headlightStyle === 'wide') {
    placeHL(xFront, hlBaseY, 0);
  } else if (hlDef.quad) {
    [-zSideHL, zSideHL].forEach(z => [-0.12, 0.12].forEach(yo => placeHL(xFront, hlBaseY + yo, z)));
  } else {
    [-zSideHL, zSideHL].forEach(z => placeHL(xFront, hlBaseY, z));
  }

  // Tail lights — per-car material so we can flash bright red on brake.
  if (!car.tailMat) car.tailMat = new THREE.MeshBasicMaterial({ color: 0x660000 });
  const tlMat = car.tailMat;
  tlMat.color.setHex(0x660000);          // reset to dim on every rebuild
  const tlDef = HL[p.taillightStyle] || HL['box-h'];
  const xRear = -p.bodyLength / 2 - 0.01 - (p.taillightX || 0);
  const tlBaseY = bodyCenterY + (p.taillightY || 0);
  const halfZTL = (HL_HALFZ[p.taillightStyle] || 0.15) * (p.taillightW || 1);
  const zSideTLraw = Math.max(0.05, p.bodyWidth / 2 - 0.25 + (p.taillightSpread || 0));
  const zSideTL = Math.min(zSideTLraw, maxOuter - halfZTL);
  const placeTL = (x, y, z) => {
    const tl = new THREE.Mesh(tlDef.viz(), tlMat);
    tl.position.set(x, y, z);
    tl.scale.set(1, p.taillightH || 1, p.taillightW || 1);
    g.add(tl);
  };
  if (p.taillightStyle === 'wide') {
    placeTL(xRear, tlBaseY, 0);
  } else if (tlDef.quad) {
    [-zSideTL, zSideTL].forEach(z => [-0.12, 0.12].forEach(yo => placeTL(xRear, tlBaseY + yo, z)));
  } else {
    [-zSideTL, zSideTL].forEach(z => placeTL(xRear, tlBaseY, z));
  }

  // Side turn signals — one mesh per side with its own material so we can
  // blink them independently from the main loop.
  car.turnSignals = { left: null, right: null };
  if (p.turnSignal && p.turnSignal.enabled) {
    const ts = p.turnSignal;
    const tw = ts.orient === 'h' ? ts.w : ts.h;
    const th = ts.orient === 'h' ? ts.h : ts.w;
    for (const side of [-1, 1]) {
      const mat = new THREE.MeshBasicMaterial({ color: 0x884400 }); // dim orange (idle)
      const m = new THREE.Mesh(new THREE.BoxGeometry(tw, th, 0.018), mat);
      m.position.set(ts.x, bodyCenterY + ts.y, side * (p.bodyWidth / 2 + 0.005));
      g.add(m);
      if (side > 0) car.turnSignals.right = m; else car.turnSignals.left = m;
    }
  }

  // Accessories (multi)
  const roofY = cabinBaseY + p.cabinHeight;
  const acc   = p.accessories || {};
  const bodyMat = () => new THREE.MeshLambertMaterial({ color: p.bodyColor });
  if (acc.spoiler) {
    const sH = p.spoilerHeight || 0.3;
    const sp = new THREE.Mesh(new THREE.BoxGeometry(0.45, 0.06, p.bodyWidth - 0.1), bodyMat());
    sp.position.set(-p.bodyLength / 2 + 0.25, bodyTopY + sH, 0);
    g.add(sp);
    [-0.55, 0.55].forEach(z => {
      const sup = new THREE.Mesh(new THREE.BoxGeometry(0.06, sH, 0.06), bodyMat());
      sup.position.set(-p.bodyLength / 2 + 0.25, bodyTopY + sH / 2, z);
      g.add(sup);
    });
  }
  if (acc.antenna) {
    const antH = 0.85;
    const ant = new THREE.Mesh(
      new THREE.CylinderGeometry(0.018, 0.022, antH, 6),
      new THREE.MeshLambertMaterial({ color: 0x111111 })
    );
    let ax, ay, az;
    if (p.antennaMount === 'front') {
      const cabinFrontX = p.cabinOffset + p.cabinLength / 2;
      ax = (p.bodyLength / 4 + cabinFrontX) / 2;
      az = p.bodyWidth / 2 - 0.10;
    } else {
      ax = -p.bodyLength / 2 + 0.18;
      az = p.bodyWidth / 2 - 0.10;
    }
    ay = bodyTopY + antH / 2;
    ant.position.set(ax, ay, az);
    g.add(ant);
  }
  if (acc.scoop) {
    const cabinFrontX = p.cabinOffset + p.cabinLength / 2;
    const hoodFront   = p.bodyLength / 2 - 0.20;
    const hoodRear    = cabinFrontX + 0.05;
    const t   = 0.5 + Math.max(-0.5, Math.min(0.5, (p.scoopX || 0) / 1.5));
    const baseX = hoodRear + (hoodFront - hoodRear) * t;
    const scoopL = Math.min(0.65, (hoodFront - hoodRear) * 0.85);
    const scoopW = 0.55;
    const sink   = p.bodyHeight * 0.15;
    const sc = new THREE.Mesh(
      makeRoundedBoxGeom(scoopL, (p.scoopRise || 0.10) + sink, scoopW,
                         Math.min(0.04, (p.scoopRise || 0.10) * 0.4)),
      bodyMat()
    );
    sc.position.set(baseX, bodyTopY + (p.scoopRise || 0.10) / 2 - sink / 2, p.scoopZ || 0);
    g.add(sc);
  }
  if (acc.roofbox) {
    const rbL = p.cabinLength * (p.roofboxLength || 0.85);
    const rbW = p.cabinWidth  * (p.roofboxWidth  || 0.78);
    const rbH = p.roofboxHeight || 0.20;
    const rb = new THREE.Mesh(
      makeRoundedBoxGeom(rbL, rbH, rbW, p.roofboxRound || 0.05),
      new THREE.MeshLambertMaterial({ color: 0x556677 })
    );
    rb.position.set(p.cabinOffset, roofY + rbH / 2, 0);
    g.add(rb);
  }
}

// ── LEVEL-BASED PARAMETRIC SYSTEM ─────────────────────────────────────────
// car.level is an unbounded integer (min 1). Each level unlocks visual
// features and shifts parameter ranges. Inspired by the parametric car
// generator at ~/komp/PROJECTS/Sketches/parametric_car_generator.html.
const PALETTES = [
  // [maxLevel, colours]
  [4,    [0x9b8b6f, 0x6e6048, 0x7a6d52, 0x8b5a3c, 0x4a4438, 0xa89a78, 0x5a5040]],   // jalopy/dull
  [12,   [0xc0392b, 0x27ae60, 0x2980b9, 0xe67e22, 0xeeeeee, 0x444444, 0xb0a890]],   // commuter
  [25,   [0xe63946, 0x457b9d, 0x2a9d8f, 0xe9c46a, 0xffffff, 0x222222, 0x6c5ce7]],   // standard
  [50,   [0x1a1a1a, 0xeeeeee, 0x2c3e50, 0x6d4c41, 0x424f4a, 0x0a3d62, 0x3d3d3d, 0x8d6e63]],  // exec
  [100,  [0xffd700, 0xff0033, 0xffffff, 0x000000, 0xff5500, 0x9b59b6, 0xff00ff, 0x00e5ff]],  // super
  [9999, [0x00fff7, 0xff00ff, 0xffd700, 0xc0c0c0, 0xff66ee, 0xfffeed, 0xfff7d6, 0x80ffaa, 0xff7f50]], // exotic
];

function rng(a, b) { return a + Math.random() * (b - a); }
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function lerp(a, b, t) { return a + (b - a) * t; }

function unlockedHeadlights(L) {
  if (L < 3)   return ['round'];
  if (L < 7)   return ['round', 'oval', 'box'];
  if (L < 14)  return ['round', 'oval', 'box', 'box-h', 'wide'];
  if (L < 25)  return ['round', 'oval', 'box', 'box-h', 'wide', 'tall', 'pill-v'];
  if (L < 45)  return ['round', 'oval', 'box', 'box-h', 'wide', 'tall', 'pill-v', 'split', 'split-round'];
  if (L < 80)  return ['oval', 'box', 'box-h', 'wide', 'tall', 'pill-v', 'split', 'split-round', 'split-tall', 'split-oval'];
  return HL_KEYS;
}
function unlockedAccessories(L) {
  if (L < 5)   return ['none'];
  if (L < 12)  return ['none', 'antenna'];
  if (L < 25)  return ['none', 'antenna', 'spoiler'];
  if (L < 45)  return ['none', 'antenna', 'spoiler', 'roofbox', 'scoop'];
  return ['none', 'antenna', 'spoiler', 'roofbox', 'scoop', 'spoiler'];
}
function unlockedCabinPositions(L) {
  if (L < 8)   return ['rear', 'center'];
  if (L < 20)  return ['rear', 'center', 'front'];
  if (L < 35)  return ['rear', 'center', 'front', 'full'];
  return ['rear', 'center', 'front', 'full', 'rear', 'center']; // weighted toward rear/center at high levels
}
function pickPalette(L) {
  return PALETTES.find(p => L <= p[0])[1];
}

const TYPE_KEYS = Object.keys(TYPES);

// ── REAL-PROPORTION CAR APPLY ──────────────────────────────────────────────
// Every upgrade rolls a NEW realistic body type and samples its own
// dimensions strictly inside the type's real-world ratio envelope.
function applyTier(car, level) {
  car.level = Math.max(1, level | 0);
  const L = car.level;
  const p = car.design;

  // Pick a random type — type changes each upgrade, but proportions stay realistic.
  const typeKey = pick(TYPE_KEYS);
  const cfg = TYPES[typeKey];
  car.bodyType = typeKey;

  // Sample real-world dimensions in mm, then convert to game units (metres).
  const lenMm  = rng(cfg.realLength[0], cfg.realLength[1]);
  const length = lenMm / 1000;                            // m
  const wheelD = length * rng(cfg.wheelOnLength[0], cfg.wheelOnLength[1]);
  // Physics wheel radius is fixed at 0.37 m; base clearance off the PHYSICS
  // wheel so the body never sinks below the actual contact patch (was
  // dragging on the ground when wheelScale < 1).
  const clearance = 0.74 * rng(cfg.clearanceOnWheel[0], cfg.clearanceOnWheel[1]);
  const roofH  = length * rng(cfg.roofOnLength[0], cfg.roofOnLength[1]);
  const hoodH  = roofH * rng(cfg.hoodOnRoof[0], cfg.hoodOnRoof[1]);
  const bodyHeight = Math.max(0.30, hoodH - clearance);
  const cabinHeight = Math.max(0.32, roofH - hoodH);

  // Wheelbase / overhang (used for visual cabin-position offset)
  const wheelbase = length * rng(cfg.wheelbaseRatio[0], cfg.wheelbaseRatio[1]);
  const totalOverhang = length - wheelbase;
  const frontOverhang = totalOverhang * 0.5;              // simplified, balanced

  // Cabin geometry
  const cabinCenterRatio = rng(cfg.cabinCenterRatio[0], cfg.cabinCenterRatio[1]);
  const cabinLengthRatio = rng(cfg.cabinLengthRatio[0], cfg.cabinLengthRatio[1]);
  const cabinLength = length * cabinLengthRatio;
  // Game's cabinOffset is X relative to chassis centre; here, ratio 0.5 = centre,
  // > 0.5 = front, < 0.5 = rear.  Convert to metres offset.
  const cabinOffset = (cabinCenterRatio - 0.5) * length;
  const cabinPosition = pick(cfg.cabinPosition);

  // Slopes (windshield + rear-window): convert degree to inward shift in metres
  const wsRake = rng(cfg.windshieldRakeDeg[0], cfg.windshieldRakeDeg[1]) * Math.PI / 180;
  const rwRake = rng(cfg.rearWindowRakeDeg[0], cfg.rearWindowRakeDeg[1]) * Math.PI / 180;
  const slopeFront = cabinHeight * Math.tan(wsRake);
  const slopeRear  = cabinHeight * Math.tan(rwRake);

  // Apply to design
  p.bodyLength    = length;
  p.bodyWidth     = rng(1.70, 1.95);                       // typical 1.7-2.0 m
  p.bodyHeight    = bodyHeight;

  // bodyLift is the body-mesh Y in carGroup local frame.  carGroup origin = chassis
  // centre, which sits ~0.77 m above the ground at rest (suspensionRest 0.40 + wheelR 0.37).
  // Setting body bottom at world-y = clearance (real ride height) means:
  //   bodyLift = clearance + bodyHeight/2 − 0.77
  // We then drop the body a bit further so wheels sit visually "inside" the
  // wheel arches with only the bottom slice sticking out (a small license over
  // strict realism — looks like a real car instead of a hovercraft).
  const CHASSIS_REST_Y = 0.77;
  const wheelArchTuck = 0.05;
  // bodyLift now = body BOTTOM in chassis-local frame (matches inspector).
  p.bodyLift = clearance - CHASSIS_REST_Y - wheelArchTuck;

  p.cabinPosition = cabinPosition;
  p.cabinOffset   = cabinOffset;
  p.cabinLength   = cabinLength;
  p.cabinHeight   = cabinHeight;
  p.cabinWidth    = p.bodyWidth * 0.92;
  p.cabinSlopeFront = Math.min(cabinLength * 0.45, slopeFront);
  p.cabinSlopeRear  = Math.min(cabinLength * 0.45, slopeRear);
  p.cabinSlopeSides = Math.random() < 0.20 ? rng(0.0, 0.06) : 0;

  // Convertible only for sports / coupe at higher levels
  p.convertible = (typeKey === 'sports' || typeKey === 'coupe')
                  && L >= 12 && Math.random() < 0.20;

  // Wheel scale: visual cylinder. Floor at 1.0 so visual ≥ physics — the
  // wheels always reach the ground. Allow up to 1.6 for big-wheel mutants.
  p.wheelScale = Math.max(1.0, Math.min(1.6, wheelD / 0.74 + (Math.random() < 0.15 ? rng(0, 0.45) : 0)));

  // Colour — chaos as before, sticks out against the monochrome arena.
  if (Math.random() < 0.30) {
    p.bodyColor = Math.floor(Math.random() * 0xffffff);
  } else {
    const pool = PALETTES.flatMap(pl => pl[1]);
    p.bodyColor = pool[Math.floor(Math.random() * pool.length)];
  }
  p.headlightStyle = pick(cfg.headlights);
  p.accessory      = pick(cfg.accessories);   // legacy field for projectile lookups
  // Rim look variety — concave or flat only (convex rims float visually
  // because the simple wheel mesh can't hide a protruding plug).
  p.rimColor   = pick([0xc8ccd0, 0x222222, 0x55585e, 0xffd700, 0xff3366,
                       0xeeeeee, 0x39ff14, 0x00e5ff, 0xb8b8b8, 0x8a6e3c]);
  p.rimDish    = pick([-1, -1, 0]) * rng(0.05, 0.14);  // 2/3 concave, 1/3 flat
  p.rimSize    = rng(0.50, 0.78);

  // ── New design fields ────────────────────────────────────────────────
  // Per-type rounding hint (jeep / pickup stay sharp, hyper / sedan rounder)
  // Bumped per-type rounding ranges so cars look softer and more varied
  // even in the classic envelope (was way too boxy across the arena).
  const ROUND = {
    sedan:[0.06,0.18], coupe:[0.08,0.22], hatch:[0.07,0.18], sports:[0.08,0.24],
    suv:[0.04,0.14],   wagon:[0.04,0.12], pickup:[0.03,0.08], van:[0.04,0.12],
    jeep:[0.03,0.08],  kei:[0.07,0.18],
  };
  const rb = ROUND[typeKey] || [0.05, 0.14];
  p.bodyRound  = rng(rb[0], rb[1]);
  p.cabinRound = rng(rb[0], rb[1]);
  p.cabinSink  = 0;

  // Headlights / taillights — neutral defaults.
  p.headlightX = 0; p.headlightY = 0; p.headlightW = 1; p.headlightH = 1; p.headlightSpread = 0;
  p.taillightStyle = pick(cfg.headlights);
  p.taillightX = 0; p.taillightY = 0; p.taillightW = 1; p.taillightH = 1; p.taillightSpread = 0;
  // Wide-style overrides (must come AFTER the reset above) — body-width
  // bar with vertical-position variety. Same treatment for tail wide.
  if (p.headlightStyle === 'wide') {
    p.headlightW = (p.bodyWidth / 0.60) * rng(0.95, 1.10);
    p.headlightY = pick([0, 0, p.bodyHeight * 0.30, -p.bodyHeight * 0.30]);
  }
  if (p.taillightStyle === 'wide') {
    p.taillightW = (p.bodyWidth / 0.60) * rng(0.95, 1.10);
    p.taillightY = pick([0, 0, p.bodyHeight * 0.30, -p.bodyHeight * 0.30]);
  }

  // Turn signals (~40%): in front of front wheel, upper body band.
  const wbHalf = wheelbase / 2;
  p.turnSignal = {
    enabled: Math.random() < 0.4,
    x: wbHalf + rng(0.05, 0.20),
    y: bodyHeight * rng(0.30, 0.45),
    w: rng(0.12, 0.22), h: rng(0.03, 0.07), orient: 'h',
  };

  // Accessories multi: re-roll from type's allowed set.
  p.accessories = { antenna: false, spoiler: false, scoop: false, roofbox: false };
  for (const a of cfg.accessories) {
    if (a !== 'none' && Math.random() < 0.35) p.accessories[a] = true;
  }
  p.antennaMount  = Math.random() < 0.5 ? 'rear' : 'front';
  p.spoilerHeight = rng(0.18, 0.45);
  p.scoopRise     = rng(0.06, 0.18);
  p.scoopX        = rng(-0.3, 0.6);
  p.scoopZ        = 0;
  p.roofboxLength = rng(0.65, 1.05);
  p.roofboxWidth  = rng(0.65, 0.95);
  p.roofboxHeight = rng(0.15, 0.30);
  p.roofboxRound  = rng(0.02, 0.10);

  // Vans: cabin aligned with rear of body (cube-like silhouette).
  if (typeKey === 'van') {
    p.cabinOffset = -length / 2 + p.cabinLength / 2;
  }

  // First 10 levels: classic only. Beyond that: 70% chance of a "crazy"
  // pass that bends every cosmetic axis hard. Big rounding, deep sink,
  // wild spread, fat spoilers, monster wheels, weird cabin offsets.
  if (L >= 10 && Math.random() < 0.70) {
    p.bodyRound       = rng(0.10, 0.45);
    p.cabinRound      = rng(0.10, 0.50);
    p.cabinSink       = rng(-0.35, 0.05);
    p.cabinOffset    += rng(-0.50, 0.50);
    p.headlightSpread = rng(-0.40, 0.25);
    p.taillightSpread = rng(-0.40, 0.25);
    p.bodyHeight     *= rng(0.80, 1.30);
    if (Math.random() < 0.55) p.wheelScale = Math.min(1.6, p.wheelScale * rng(1.10, 1.45));
    if (Math.random() < 0.60 && !p.accessories.spoiler) p.accessories.spoiler = true;
    if (p.accessories.spoiler) p.spoilerHeight = rng(0.25, 0.75);
    if (Math.random() < 0.40) p.accessories.scoop = true;
    if (Math.random() < 0.30) p.accessories.antenna = true;
    p.rimDish = -1 * rng(0.08, 0.16);   // always concave when crazy
  }

  applyDesignVisuals(car);
  if (car === player) {
    if (!p.turnSignal.enabled) {
      p.turnSignal.enabled = true;
      applyDesignVisuals(car);
    }
    rebuildPlayerPreview();
  }
}

// Pull the body / cabin / lights / wheels into sync with car.design. Used
// by applyTier on level change and by the morph ticker every frame during
// a transition so the player car can morph between two designs smoothly.
function applyDesignVisuals(car) {
  const p = car.design;
  rebuildCarVisual(car);
  if (typeof rebuildShadowsFor === 'function') rebuildShadowsFor(car);
  if (!car.wheels) return;
  const s = p.wheelScale;
  car.wheels.forEach(w => w.scale.set(s, s, s));
  car.wheels.forEach(wg => {
    if (wg.userData.hubMat) wg.userData.hubMat.color.setHex(p.rimColor || 0xc8ccd0);
    const dishSign = Math.sign(p.rimDish || 0);
    const sz = p.rimSize ? (p.rimSize / 0.62) : 1;
    const innerScale = dishSign < 0 ? 1.6 : 0.65;
    wg.children.forEach(c => {
      if (!c.userData.role) return;
      const baseZ = c.userData.baseZ || 0;
      c.position.z = baseZ;
      if (c.userData.role === 'hub') c.scale.set(sz, sz, 1);
      if (c.userData.role === 'innerHub') c.scale.set(sz * innerScale, sz * innerScale, 1);
    });
  });
}

// ── Design morph (player-only) ──────────────────────────────────────────
const MORPH_NUMERIC = [
  'bodyLength','bodyWidth','bodyHeight','bodyLift',
  'cabinLength','cabinWidth','cabinHeight','cabinOffset',
  'cabinSlopeFront','cabinSlopeRear','cabinSlopeSides',
  'bodyRound','cabinRound','cabinSink',
  'wheelScale',
  'headlightX','headlightY','headlightW','headlightH','headlightSpread',
  'taillightX','taillightY','taillightW','taillightH','taillightSpread',
  'spoilerHeight','scoopRise','scoopX','scoopZ',
  'roofboxLength','roofboxWidth','roofboxHeight','roofboxRound',
  'rimSize','rimDish',
];
const MORPH_COLOR = ['bodyColor', 'rimColor'];

function _lerp(a, b, t) { return a + (b - a) * t; }
function _lerpHex(a, b, t) {
  const ar=(a>>16)&255, ag=(a>>8)&255, ab=a&255;
  const br=(b>>16)&255, bg=(b>>8)&255, bb=b&255;
  return (Math.round(_lerp(ar,br,t))<<16) | (Math.round(_lerp(ag,bg,t))<<8) | Math.round(_lerp(ab,bb,t));
}
function _clone(o) { return JSON.parse(JSON.stringify(o)); }

function lerpDesign(a, b, t) {
  // Discrete fields snap at the midpoint; numeric & colour fields lerp.
  const out = _clone(t < 0.5 ? a : b);
  for (const k of MORPH_NUMERIC) {
    if (typeof a[k] === 'number' && typeof b[k] === 'number') out[k] = _lerp(a[k], b[k], t);
  }
  for (const k of MORPH_COLOR) {
    if (typeof a[k] === 'number' && typeof b[k] === 'number') out[k] = _lerpHex(a[k], b[k], t);
  }
  if (a.turnSignal && b.turnSignal) {
    out.turnSignal = { ...(t < 0.5 ? a.turnSignal : b.turnSignal) };
    for (const k of ['x','y','w','h']) {
      out.turnSignal[k] = _lerp(a.turnSignal[k], b.turnSignal[k], t);
    }
  }
  return out;
}

let morphState = null;     // { from, to, t0, dur } — null when idle
function startMorph(from, to, dur) {
  morphState = { from, to, t0: performance.now(), dur: dur || 900 };
}
// Wrap applyTier so player-only changes morph between old and new design.
function applyTierMaybeMorph(car, level) {
  if (car !== player) { applyTier(car, level); return; }
  const old = _clone(player.design);
  applyTier(car, level);
  const next = _clone(player.design);
  player.design = old;
  applyDesignVisuals(player);
  startMorph(old, next);
}

// Damage: shooter +1 level (unbounded), victim -1 level (floor 1)
function damage(victim, attacker) {
  if (victim === attacker) return;
  applyTierMaybeMorph(attacker, attacker.level + 1);
  if (victim.level <= 1) {
    // KO — victim is at the bottom; teleport away so it can't be farmed
    respawnCar(victim);
    Synth.respawn();
  } else {
    applyTierMaybeMorph(victim, victim.level - 1);
  }
  updateBadges();
  Synth.mutate();
}

// ── LEVEL BADGES (white digit, yellow if leader) ──────────────────────────
function makeBadge() {
  const canvas = document.createElement('canvas');
  canvas.width = 256; canvas.height = 128;
  const ctx = canvas.getContext('2d');
  const tex = new THREE.CanvasTexture(canvas);
  tex.minFilter = THREE.LinearFilter;
  const sprite = new THREE.Sprite(new THREE.SpriteMaterial({
    map: tex, transparent: true, depthTest: false, depthWrite: false,
  }));
  sprite.scale.set(2.6, 1.3, 1);  // preserves 2:1 aspect of the canvas
  sprite.renderOrder = 999;
  scene.add(sprite);
  return { canvas, ctx, tex, sprite, key: '' };
}

function paintBadge(badge, level, isLeader) {
  const key = level + (isLeader ? 'Y' : 'W');
  if (badge.key === key) return;
  badge.key = key;
  const ctx = badge.ctx;
  const W = badge.canvas.width, H = badge.canvas.height;
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = isLeader ? '#ffd700' : '#ffffff';
  ctx.font = 'bold 110px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowColor = 'rgba(0,0,0,0.85)';
  ctx.shadowBlur = 10;
  ctx.fillText(String(level), W / 2, H / 2 + 4);
  ctx.shadowBlur = 0;
  badge.tex.needsUpdate = true;
}

function updateBadges() {
  // Leader = car(s) with the highest level. Their badge is yellow; others white.
  let maxLevel = -Infinity;
  for (const c of allCars) if (c.level > maxLevel) maxLevel = c.level;
  for (const c of allCars) paintBadge(c.badge, c.level, c.level === maxLevel);
}

function makeCar(px, pz, color) {
  // Physics chassis
  const chassis = new CANNON.Body({ mass: 650, material: matCar });
  chassis.addShape(new CANNON.Box(new CANNON.Vec3(1.85, 0.32, 0.92)));
  chassis.position.set(px, 1.4, pz);
  chassis.linearDamping = 0.05;
  chassis.angularDamping = 0.6;
  world.addBody(chassis);

  // Visual group (filled by rebuildCarVisual)
  const group = new THREE.Group();
  scene.add(group);

  // RaycastVehicle
  const vehicle = new CANNON.RaycastVehicle({
    chassisBody: chassis,
    indexRightAxis: 2,
    indexUpAxis: 1,
    indexForwardAxis: 0,
  });

  // Friction high so steering bites; suspension soft+long for visible bounce
  const wBase = {
    radius: 0.37,
    directionLocal: new CANNON.Vec3(0, -1, 0),
    suspensionStiffness: 42,
    suspensionRestLength: 0.40,
    frictionSlip: 5.5,
    dampingRelaxation: 2.0,
    dampingCompression: 3.4,
    maxSuspensionForce: 220000,
    rollInfluence: 0.02,
    axleLocal: new CANNON.Vec3(0, 0, 1),
    maxSuspensionTravel: 0.50,
    customSlidingRotationalSpeed: -30,
    useCustomSlidingRotationalSpeed: true,
  };

  // FL, FR, RL, RR
  [[1.42, 0.92],[1.42, -0.92],[-1.42, 0.92],[-1.42, -0.92]].forEach(([fx, fz]) => {
    vehicle.addWheel({
      ...wBase,
      chassisConnectionPointLocal: new CANNON.Vec3(fx, 0, fz)
    });
  });

  vehicle.addToWorld(world);

  // Wheel meshes — tyre + hub disc on each side, grouped so updateWheelTransform spins them
  const tyreGeom = new THREE.CylinderGeometry(0.37, 0.37, 0.32, 20);
  tyreGeom.applyMatrix4(new THREE.Matrix4().makeRotationX(Math.PI / 2));
  const tyreMat = new THREE.MeshLambertMaterial({ color: 0x1a1a1a });

  const hubGeom = new THREE.CircleGeometry(0.22, 18);
  const hubMat  = new THREE.MeshLambertMaterial({ color: 0xbbbbbb });
  const innerHubGeom = new THREE.CircleGeometry(0.10, 14);
  const innerHubMat  = new THREE.MeshLambertMaterial({ color: 0x444444 });

  // Per-car hub material so each car can have its own rim colour.
  const hubMatLocal = new THREE.MeshLambertMaterial({ color: 0xc8ccd0 });
  const wheels = vehicle.wheelInfos.map(() => {
    const wg = new THREE.Group();
    const tyre = new THREE.Mesh(tyreGeom, tyreMat);
    tyre.castShadow = true;
    wg.add(tyre);

    [0.165, -0.165].forEach((z, i) => {
      const hub = new THREE.Mesh(hubGeom, hubMatLocal);
      hub.position.z = z;
      if (i === 1) hub.rotation.y = Math.PI;
      hub.userData.role = 'hub';
      hub.userData.baseZ = z;
      wg.add(hub);
      const inner = new THREE.Mesh(innerHubGeom, innerHubMat);
      inner.position.z = z + (i === 0 ? 0.001 : -0.001);
      if (i === 1) inner.rotation.y = Math.PI;
      inner.userData.role = 'innerHub';
      inner.userData.baseZ = z + (i === 0 ? 0.001 : -0.001);
      wg.add(inner);
    });
    wg.userData.hubMat = hubMatLocal;
    scene.add(wg);
    return wg;
  });

  const car = { vehicle, chassis, group, wheels, design: defaultDesign(color) };
  rebuildCarVisual(car);
  return car;
}

// ── Pac-man visual mirroring ───────────────────────────────────────────
// Every car is rendered EIGHT extra times at the surrounding arena tiles
// so the world reads as seamlessly tiled. Mirrors clone car.group's body
// children plus the wheel children, and follow position/rotation/scale
// every frame. Rebuilt whenever applyDesignVisuals(car) runs.
const SHADOW_OFFSETS = [];
for (const dx of [-1, 0, 1]) for (const dz of [-1, 0, 1]) {
  if (dx === 0 && dz === 0) continue;
  SHADOW_OFFSETS.push({ dx, dz });
}
function makeShadows(car) {
  car.shadowBodies = SHADOW_OFFSETS.map(off => {
    const g = new THREE.Group();
    g.userData.off = off;
    scene.add(g);
    return g;
  });
  if (car.wheels) {
    car.shadowWheelSets = SHADOW_OFFSETS.map(off => {
      return car.wheels.map(() => {
        const g = new THREE.Group();
        g.userData.off = off;
        scene.add(g);
        return g;
      });
    });
  }
}
function rebuildShadowsFor(car) {
  if (!car.shadowBodies) return;
  for (const s of car.shadowBodies) {
    while (s.children.length) s.remove(s.children[0]);
    for (const child of car.group.children) s.add(child.clone());
  }
  if (car.wheels && car.shadowWheelSets) {
    for (let oi = 0; oi < SHADOW_OFFSETS.length; oi++) {
      const wheels = car.shadowWheelSets[oi];
      for (let i = 0; i < car.wheels.length; i++) {
        const sw = wheels[i];
        while (sw.children.length) sw.remove(sw.children[0]);
        for (const c of car.wheels[i].children) sw.add(c.clone());
      }
    }
  }
}
function syncShadows() {
  // Mirrors are a CHASE-view trick. In bird's-eye (5) and spectator (6)
  // they overlap into clutter, so hide them in those modes.
  const showMirrors = camMode !== 5 && camMode !== 6;
  for (const car of allCars) {
    if (!car.shadowBodies) continue;
    for (const s of car.shadowBodies) {
      s.visible = showMirrors;
      if (!showMirrors) continue;
      const off = s.userData.off;
      s.position.set(
        car.group.position.x + off.dx * 2 * A,
        car.group.position.y,
        car.group.position.z + off.dz * 2 * A);
      s.quaternion.copy(car.group.quaternion);
    }
    if (car.wheels && car.shadowWheelSets) {
      for (let oi = 0; oi < SHADOW_OFFSETS.length; oi++) {
        const off = SHADOW_OFFSETS[oi];
        const wheels = car.shadowWheelSets[oi];
        for (let i = 0; i < car.wheels.length; i++) {
          const w = car.wheels[i], sw = wheels[i];
          sw.visible = showMirrors;
          if (!showMirrors) continue;
          sw.position.set(
            w.position.x + off.dx * 2 * A,
            w.position.y,
            w.position.z + off.dz * 2 * A);
          sw.quaternion.copy(w.quaternion);
          sw.scale.copy(w.scale);
        }
      }
    }
  }
}

// ── Local wrap flash (3-D sphere around the car, not a fullscreen overlay).
// Two flashes per wrap: one at the EXIT side (where the car disappears)
// and one at the ENTRY side (where it pops back in).
const _flashes = [];
function spawnWrapFlash(x, y, z, now) {
  const m = new THREE.Mesh(
    new THREE.SphereGeometry(2.6, 14, 10),
    new THREE.MeshBasicMaterial({ color: 0xfff0c8, transparent: true, opacity: 0.85 })
  );
  m.position.set(x, y + 0.6, z);
  scene.add(m);
  _flashes.push({ mesh: m, t0: now, dur: 260 });
}
function tickFlashes(now) {
  for (let i = _flashes.length - 1; i >= 0; i--) {
    const f = _flashes[i];
    const t = (now - f.t0) / f.dur;
    if (t >= 1) {
      scene.remove(f.mesh);
      f.mesh.geometry.dispose(); f.mesh.material.dispose();
      _flashes.splice(i, 1);
    } else {
      f.mesh.material.opacity = (1 - t) * 0.85;
      f.mesh.scale.setScalar(1 + t * 1.3);
    }
  }
}

// ── Bowling-ball mode ──────────────────────────────────────────────────
// At ≥ 400 km/h the player car becomes a wrecking ball: any AI it hits
// is launched along the player's velocity vector. The struck car gets
// a temporary "rammed" window during which the global up-velocity clamp
// is skipped so it can actually fly. With Pac-man wrap, the launched
// car ricochets across portals until it bleeds off speed.
const RAM_KMH = 400;
const RAM_MS  = RAM_KMH / 3.6;          // ≈ 111 m/s
let _ramHitThisFrame = false;
player.chassis.addEventListener('collide', (event) => {
  if (!event.body) return;
  const otherCar = allCars.find(c => c.chassis === event.body);
  if (!otherCar || otherCar === player) return;
  const v = player.chassis.velocity;
  const speed = Math.sqrt(v.x*v.x + v.y*v.y + v.z*v.z);
  if (speed < RAM_MS) return;
  const flatLen = Math.max(0.01, Math.sqrt(v.x*v.x + v.z*v.z));
  const dx = v.x / flatLen, dz = v.z / flatLen;
  const mag = 2200 * (speed / RAM_MS);
  otherCar.chassis.applyImpulse(
    new CANNON.Vec3(dx * mag, 1400, dz * mag),
    new CANNON.Vec3(0, 0, 0)
  );
  otherCar._rammedUntil = performance.now() + 2800;
  _ramHitThisFrame = true;          // signal main loop to preserve player velocity
  if (Synth.hit) Synth.hit();
});
