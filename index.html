function respawnCar(car) {
  // Random spot inside arena, random heading
  const angle = Math.random() * Math.PI * 2;
  const r = 30 + Math.random() * 35;
  const x = Math.max(-A + 8, Math.min(A - 8, Math.cos(angle) * r));
  const z = Math.max(-A + 8, Math.min(A - 8, Math.sin(angle) * r));
  car.chassis.position.set(x, 2.5, z);
  car.chassis.velocity.set(0, 0, 0);
  car.chassis.angularVelocity.set(0, 0, 0);
  car.chassis.quaternion.setFromEuler(0, Math.random() * Math.PI * 2, 0);
  // If car is an AI, clear its stuck timer so it doesn't insta-respawn again
  const idx = aiCars.indexOf(car);
  if (idx >= 0) aiState[idx].stuckTime = 0;
}

function tickAI(car, state, dt, now) {
  const p = car.chassis.position;
  // Fell off the arena (or somehow flew very high) — teleport back inside.
  if (p.y < -25 || p.y > 80 || Math.abs(p.x) > A + 30 || Math.abs(p.z) > A + 30) {
    respawnCar(car);
    state.stuckTime = 0;
    state.mode = 'chase';
    return;
  }
  const vel = car.chassis.velocity;
  const spd = Math.sqrt(vel.x * vel.x + vel.z * vel.z);

  // Detect flipped (car's local up no longer points up)
  const upLocal = new CANNON.Vec3(0, 1, 0);
  const upWorld = new CANNON.Vec3();
  car.chassis.quaternion.vmult(upLocal, upWorld);
  const flipped = upWorld.y < 0.3;

  // Stuck timer: low speed for sustained period, or flipped
  if (flipped || spd < 1.2) state.stuckTime += dt;
  else state.stuckTime = 0;

  if (state.stuckTime > 2.2) {
    respawnCar(car);
    Synth.respawn();
    state.stuckTime = 0;
    state.mode = 'chase';
    return;
  }

  // Pick the NEAREST other car as the chase target — keeps the arena lively
  // and stops every AI from dog-piling the player.
  let target = player, bestD = Infinity;
  for (const other of allCars) {
    if (other === car) continue;
    const ox = other.chassis.position.x - p.x;
    const oz = other.chassis.position.z - p.z;
    const od = ox*ox + oz*oz;
    if (od < bestD) { bestD = od; target = other; }
  }
  const tp = target.chassis.position;
  const dx = tp.x - p.x;
  const dz = tp.z - p.z;
  const dist = Math.max(0.1, Math.sqrt(dx * dx + dz * dz));

  // Mode switching: occasionally back off when too close (avoid pile-up)
  if (now > state.modeUntil) {
    if (state.mode === 'chase' && dist < 6 && Math.random() < 0.3) {
      state.mode = 'reverse';
      state.modeUntil = now + 700 + Math.random() * 600;
    } else if (state.mode === 'reverse') {
      state.mode = 'chase';
      state.modeUntil = now + 2000 + Math.random() * 2000;
    } else if (state.mode === 'chase' && Math.random() < 0.05) {
      // Brief flank — aim slightly off-target
      state.mode = 'flank';
      state.flankSign = Math.random() < 0.5 ? 1 : -1;
      state.modeUntil = now + 1200;
    } else if (state.mode === 'flank') {
      state.mode = 'chase';
      state.modeUntil = now + 1500;
    }
  }

  // Aim point depends on mode
  let aimX = dx, aimZ = dz;
  if (state.mode === 'flank') {
    // Aim 8m to the side of player
    const px = -dz / dist, pz = dx / dist; // perpendicular
    aimX = dx + px * 8 * state.flankSign;
    aimZ = dz + pz * 8 * state.flankSign;
  }

  const aimDist = Math.max(0.1, Math.sqrt(aimX * aimX + aimZ * aimZ));
  const tx = aimX / aimDist, tz = aimZ / aimDist;

  // Car forward vector
  const fwdLocal = new CANNON.Vec3(1, 0, 0);
  const fwd = new CANNON.Vec3();
  car.chassis.quaternion.vmult(fwdLocal, fwd);

  const cross = fwd.x * tz - fwd.z * tx;
  const dot   = fwd.x * tx + fwd.z * tz;

  let steerSign = state.mode === 'reverse' ? 1 : -1;
  let targetSteer = Math.max(-0.5, Math.min(0.5, steerSign * cross * 3));
  state.steer += (targetSteer - state.steer) * 0.2;

  let force = 4400;
  if (state.mode === 'reverse') force = -3500;
  else if (dot < -0.3) force = 1500;  // ease off when facing wrong way

  const fPer = force / 2;
  car.vehicle.applyEngineForce(fPer, 0);
  car.vehicle.applyEngineForce(fPer, 1);
  car.vehicle.applyEngineForce(fPer, 2);
  car.vehicle.applyEngineForce(fPer, 3);
  car.vehicle.setSteeringValue(state.steer, 0);
  car.vehicle.setSteeringValue(state.steer, 1);
  [0, 1, 2, 3].forEach(i => car.vehicle.setBrake(0, i));

  // Shooting: aimed at player + close enough + cooldown
  if (dist < 38 && dot > 0.65 && state.mode !== 'reverse'
      && now - state.lastShot > 900 + Math.random() * 700) {
    shoot(car);
    state.lastShot = now;
  }

  // Jumping disabled per request — no cars jump anymore.
}

// ── SYNTH ──────────────────────────────────────────────────────────────────
// Tiny Web-Audio synth. Every sound family steps through a fixed pattern of
// pitches, each with mild random jitter, so repeats become a melody-ish loop.
const Synth = (() => {
  const Ctx = window.AudioContext || window.webkitAudioContext;
  const ctx = new Ctx();
  const master = ctx.createGain();
  master.gain.value = 0.32;
  master.connect(ctx.destination);

  let muted = false;
  function setMute(v) {
    muted = v;
    master.gain.setTargetAtTime(v ? 0.0001 : 0.32, ctx.currentTime, 0.05);
  }
  function ensureRunning() {
    if (ctx.state === 'suspended') ctx.resume();
  }

  // Engine speed level (0..1) — drives the bass sequencer's loudness/cutoff
  let engineLevel = 0;
  function setEngine(speed) {
    engineLevel = Math.min(1, speed / 25);
  }

  // Generic short envelope blip with lowpass for muffled feel
  function blip({ freq, dur = 0.12, type = 'sine', cutoff = 800, vel = 0.25, sweep = 0, q = 0.7 }) {
    if (muted) return;
    ensureRunning();
    const t = ctx.currentTime;
    const osc = ctx.createOscillator();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t);
    if (sweep) osc.frequency.linearRampToValueAtTime(sweep, t + dur);
    const g = ctx.createGain();
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(vel, t + 0.006);
    g.gain.exponentialRampToValueAtTime(0.0005, t + dur);
    const f = ctx.createBiquadFilter();
    f.type = 'lowpass';
    f.frequency.value = cutoff;
    f.Q.value = q;
    osc.connect(f).connect(g).connect(master);
    osc.start(t);
    osc.stop(t + dur + 0.03);
  }

  // Patterns — each family advances through its sequence on every call
  const counters = {};
  function step(key, arr) {
    const i = (counters[key] || 0);
    counters[key] = i + 1;
    return arr[i % arr.length];
  }
  const J = () => 1 + (Math.random() - 0.5) * 0.04; // ±2% jitter
  const M = (m) => 440 * Math.pow(2, (m - 69) / 12); // MIDI → Hz

  // ── Popcorn — extracted directly from MIDI (Kingsley / Hot Butter, 1972).
  // Each entry = [dt-from-previous-ms, MIDI-pitch].  Tempo 147 BPM, 8th=204ms.
  const MEL = [[0,71],[204,69],[204,71],[204,66],[204,62],[204,66],[204,59],[408,71],[204,69],[204,71],[204,66],[204,62],[204,66],[204,59],[408,71],[204,73],[204,74],[204,73],[204,74],[204,71],[204,73],[204,71],[204,73],[204,69],[204,71],[204,69],[204,71],[204,67],[204,71],[408,71],[204,69],[204,71],[204,66],[204,62],[204,66],[204,59],[408,71],[204,69],[204,71],[204,66],[204,62],[204,66],[204,59],[408,71],[204,73],[204,74],[204,73],[204,74],[204,71],[204,73],[204,71],[204,73],[204,69],[204,71],[204,69],[204,71],[204,73],[204,74],[408,66],[204,64],[204,66],[204,62],[204,57],[204,62],[204,54],[408,66],[204,64],[204,66],[204,62],[204,57],[204,62],[204,54],[408,66],[204,68],[204,69],[204,68],[204,69],[204,66],[204,68],[204,66],[204,68],[204,64],[204,66],[204,64],[204,66],[204,62],[204,66],[408,66],[204,64],[204,66],[204,62],[204,57],[204,62],[204,54],[408,66],[204,64],[204,66],[204,62],[204,57],[204,62],[204,54],[408,66],[204,68],[204,69],[204,68],[204,69],[204,66],[204,68],[204,66],[204,68],[204,64],[204,66],[204,64],[204,66],[204,62],[204,66],[408,71],[204,69],[204,71],[204,66],[204,62],[102,66],[204,59],[102,59],[408,71],[204,69],[204,71],[204,66],[204,62],[102,66],[204,59],[510,71],[204,73],[204,74],[204,73],[102,74],[204,74],[102,71],[204,73],[204,71],[102,73],[204,73],[102,69],[204,71],[204,69],[102,71],[204,71],[102,69],[204,71],[408,71],[204,69],[204,71],[204,66],[204,62],[102,66],[204,59],[510,71],[204,69],[204,71],[204,66],[204,62],[102,66],[204,59],[510,71],[204,73],[204,74],[204,73],[102,74],[204,74],[102,71],[204,73],[204,71],[102,73],[204,73],[102,69],[204,71],[204,69],[102,71],[204,71],[102,73],[204,74],[408,66],[204,64],[204,66],[204,62],[204,57],[102,62],[204,54],[510,66],[204,64],[204,66],[204,62],[204,57],[102,62],[204,54],[510,66],[204,68],[204,69],[204,68],[102,69],[204,69],[102,66],[204,68],[204,66],[102,68],[204,68],[102,64],[204,66],[204,64],[102,66],[204,66],[102,62],[204,66],[408,66],[204,64],[204,66],[204,62],[204,57],[102,62],[204,54],[510,66],[204,64],[204,66],[204,62],[204,57],[102,62],[204,54],[510,66],[204,68],[204,69],[204,68],[102,69],[204,69],[102,66],[204,68],[204,66],[102,68],[204,68],[102,64],[204,66]];
  const BASS = [[0,35],[204,47],[102,42],[102,35],[204,47],[102,42],[102,35],[204,47],[102,42],[102,35],[102,39],[102,40],[102,42],[102,35],[204,47],[102,42],[102,35],[204,47],[102,42],[102,35],[204,47],[102,42],[102,35],[102,39]];

  // Triads from B-minor (the song's key) for chord stabs
  const CHORDS = [[59,62,66],[64,67,71],[66,69,73],[57,60,64],[62,66,69]].map(c => c.map(M));
  // Two-note rising chirps for jump
  const RISE = [[59,66],[62,69],[64,71],[57,64],[59,71]].map(p => p.map(M));
  // Falling drops for respawn
  const FALL = [[78,59],[76,57],[74,59],[71,55],[73,59]].map(p => p.map(M));

  // Bass loop — runs continuously, volume gated by engineLevel
  let bassIdx = 0;
  function bassTick() {
    const [, midi] = BASS[bassIdx];
    if (engineLevel > 0.04 && !muted && ctx.state === 'running') {
      const f = M(midi);
      blip({
        freq: f,
        dur: 0.16,
        type: 'sawtooth',
        cutoff: 280 + engineLevel * 500,
        vel: 0.06 + engineLevel * 0.18,
        q: 0.9,
      });
    }
    const nextIdx = (bassIdx + 1) % BASS.length;
    const dtNext = BASS[nextIdx][0];
    bassIdx = nextIdx;
    setTimeout(bassTick, dtNext);
  }
  setTimeout(bassTick, 50);  // kick off the loop after init

  let melIdx = 0;

  return {
    setEngine,
    setMute,
    isMuted: () => muted,
    ensureRunning,
    // Plays the next melody note in the Popcorn line, returns ms-until-next-note
    shoot() {
      const [, midi] = MEL[melIdx];
      const f = M(midi) * J();
      blip({ freq: f, dur: 0.09, type: 'square', cutoff: 1300, vel: 0.20, sweep: f * 0.93 });
      melIdx = (melIdx + 1) % MEL.length;
      return MEL[melIdx][0];  // dt of the next note
    },
    // Sub-bass thump on hit
    hit() {
      const f = M(36) * J();
      blip({ freq: f, dur: 0.22, type: 'sawtooth', cutoff: 260, vel: 0.40, sweep: f * 0.55, q: 1.2 });
    },
    jump() {
      const [a, b] = step('jump', RISE);
      blip({ freq: a * J(), dur: 0.10, type: 'square', cutoff: 1100, vel: 0.18 });
      setTimeout(() => blip({ freq: b * J(), dur: 0.14, type: 'square', cutoff: 1200, vel: 0.20 }), 70);
    },
    respawn() {
      const [a, b] = step('respawn', FALL);
      blip({ freq: a * J(), dur: 0.12, type: 'triangle', cutoff: 900, vel: 0.18 });
      setTimeout(() => blip({ freq: b * J(), dur: 0.22, type: 'triangle', cutoff: 700, vel: 0.20, sweep: b * 0.7 }), 80);
    },
    mutate() {
      const chord = step('mutate', CHORDS);
      chord.forEach((f, i) => {
        setTimeout(() => blip({ freq: f * J(), dur: 0.20, type: 'sine', cutoff: 1500, vel: 0.13 }), i * 38);
      });
    },
  };
})();

// ── PROJECTILES ────────────────────────────────────────────────────────────
const projectiles = [];

// Projectile = exact same lamp geometry as on the car, at the EXACT same
// size (no upscaling). It looks like a copy of the headlight detaching
// and flying off. Range tuned via .life, not size.
function makeProjectileMesh(style, design) {
  const def = HL[style] || HL.box;
  const g = def.viz();
  const w = (design && design.headlightW) || 1;
  const h = (design && design.headlightH) || 1;
  g.scale(1, h, w);
  return new THREE.Mesh(g, projMatLight);
}

// For a given car, return the local-space spawn points of every headlight.
// Position matches what rebuildCarVisual draws so the projectile appears to
// detach from the actual headlight.
function headlightSpawns(car) {
  const p = car.design;
  const xFront = Math.max(p.bodyLength / 2 + 0.4, 2.4);
  const zSide  = p.bodyWidth / 2 - 0.25;
  const yBody  = p.bodyLift + p.bodyHeight / 2;   // body centre (lift is bottom now)
  const style  = p.headlightStyle;
  const def    = HL[style] || HL.box;
  const out = [];
  if (style === 'wide') {
    out.push({ pos: [xFront, yBody, 0], style });
  } else if (def.quad) {
    for (const z of [-zSide, zSide]) {
      for (const yo of [-0.12, 0.12]) {
        out.push({ pos: [xFront, yBody + yo, z], style });
      }
    }
  } else {
    for (const z of [-zSide, zSide]) {
      out.push({ pos: [xFront, yBody, z], style });
    }
  }
  return out;
}

function shoot(car) {
  // One melody note per shot (only audible when the player fires)
  const nextDt = (car === player) ? Synth.shoot() : 0;

  // Forward direction in world space
  const fwdLocal = new CANNON.Vec3(1, 0, 0);
  const fwd = new CANNON.Vec3();
  car.chassis.quaternion.vmult(fwdLocal, fwd);

  const baseSpeed = 55;
  for (const spawn of headlightSpawns(car)) {
    // Local → world for spawn position
    const localOff = new CANNON.Vec3(spawn.pos[0], spawn.pos[1], spawn.pos[2]);
    const worldOff = new CANNON.Vec3();
    car.chassis.quaternion.vmult(localOff, worldOff);

    const body = new CANNON.Body({ mass: 3 });
    body.addShape(new CANNON.Sphere(0.18));   // physics: simple sphere collider
    body.collisionFilterGroup = 2;            // projectile group
    body.collisionFilterMask  = -1 ^ 2;       // collide with everything EXCEPT other projectiles
    body.position.set(
      car.chassis.position.x + worldOff.x,
      car.chassis.position.y + worldOff.y,
      car.chassis.position.z + worldOff.z
    );
    body.linearDamping = 0;
    body.velocity.set(
      car.chassis.velocity.x + fwd.x * baseSpeed,
      car.chassis.velocity.y + 1.2,
      car.chassis.velocity.z + fwd.z * baseSpeed
    );
    world.addBody(body);

    // Visual: a copy of the headlight, oriented with the car at firing time
    const mesh = makeProjectileMesh(spawn.style, car.design);
    mesh.quaternion.copy(car.chassis.quaternion);
    scene.add(mesh);

    const proj = { body, mesh, life: 6, dead: false, owner: car };
    body.addEventListener('collide', (e) => {
      if (proj.dead) return;
      // Ignore brushes against the firing car itself (spawn-overlap on short
      // jalopy bodies, or self-overtake on a long projectile).
      if (e.body === car.chassis) return;
      let hitCar = false;
      for (const c of allCars) {
        if (e.body === c.chassis && c !== car) {
          damage(c, car);
          hitCar = true;
          break;
        }
      }
      if (hitCar) Synth.hit();
      proj.dead = true;
    });
    projectiles.push(proj);
  }
  return nextDt;
}

function updateProjectiles(dt) {
  for (let i = projectiles.length - 1; i >= 0; i--) {
    const p = projectiles[i];
    p.life -= dt;
    if (p.life <= 0 || p.dead) {
      world.removeBody(p.body);
      scene.remove(p.mesh);
      projectiles.splice(i, 1);
    } else {
      p.mesh.position.copy(p.body.position);
    }
  }
}

// ── INPUT ──────────────────────────────────────────────────────────────────
const K = {};
let camMode = 0;  // see camOff array declared earlier in the script.
let nextShotTime = 0;
let lastJump = 0;        // legacy — kept for AI state struct
let lastJTurn = 0;       // E-key police J-turn cooldown
let jturnState = null;   // { fromQ, toQ, t0, dur } during the spin animation

window.addEventListener('keydown', e => {
  K[e.code] = true;
  if (e.code === 'KeyR') resetPlayer();
  if (e.code === 'KeyV') camMode = (camMode + 1) % 7;
  if (e.code === 'KeyM') Synth.setMute(!Synth.isMuted());
  Synth.ensureRunning();
  const block = ['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight','KeyQ','KeyE','KeyV','KeyM'];
  if (block.includes(e.code)) e.preventDefault();
});
window.addEventListener('keyup', e => { K[e.code] = false; });

// Detect touch device — small viewport OR touch-capable. Adds body.touch class.
if ('ontouchstart' in window || navigator.maxTouchPoints > 0 || window.innerWidth <= 800) {
  document.body.classList.add('touch');
}

// ── TOUCH STEERING PAD — analog wheel + drift zone ────────────────────────
// touchSteer is null when finger is off the pad, else -1..+1 (analog).
// touchDrifting is true when the active touch sits inside the upper drift zone.
let touchSteer = null;
let touchDrifting = false;
const steerPadEl  = document.getElementById('tc-steer-pad');
const steerKnobEl = document.getElementById('tc-steer-knob');
const driftZoneEl = document.getElementById('tc-drift-zone');
const steerTrackEl = document.getElementById('tc-steer-track');

function readSteerTouch(clientX, clientY) {
  const padR = steerPadEl.getBoundingClientRect();
  // Steering value: position relative to the centre of the WHOLE pad, then
  // saturated so the outer ~30% of the slider already gives full lock —
  // matches what desktop's keyboard does (instant ±MAX_STEER on press).
  const halfW = padR.width / 2;
  const xFromCentre = clientX - padR.left - halfW;
  let raw = xFromCentre / halfW;            // -1..+1 across the pad
  // Saturate at 70% so finger doesn't need to reach the absolute edge.
  let s = Math.max(-1, Math.min(1, raw / 0.70));
  // Tiny centre dead zone (no jitter).
  if (Math.abs(s) < 0.05) s = 0;
  touchSteer = s;
  steerKnobEl.style.left = ((s * 0.5 + 0.5) * 100) + '%';
  // Drift zone: top portion of the pad. Slide up while steering = handbrake.
  const localY = clientY - padR.top;
  touchDrifting = localY < 78;
  driftZoneEl.classList.toggle('pressed', touchDrifting);
  steerKnobEl.classList.add('pressed');
}
function clearSteerTouch() {
  touchSteer = null;
  touchDrifting = false;
  steerKnobEl.style.left = '50%';
  steerKnobEl.classList.remove('pressed');
  driftZoneEl.classList.remove('pressed');
}
steerPadEl.addEventListener('touchstart', e => {
  e.preventDefault();
  Synth.ensureRunning();
  const t = e.touches[0];
  readSteerTouch(t.clientX, t.clientY);
}, { passive: false });
steerPadEl.addEventListener('touchmove', e => {
  e.preventDefault();
  // Find the touch that started on this pad — use the first one for simplicity
  const t = e.touches[0];
  readSteerTouch(t.clientX, t.clientY);
}, { passive: false });
steerPadEl.addEventListener('touchend', e => {
  e.preventDefault();
  if (e.touches.length === 0) clearSteerTouch();
}, { passive: false });
steerPadEl.addEventListener('touchcancel', clearSteerTouch);
// Mouse fallback for desktop testing
steerPadEl.addEventListener('mousedown', e => {
  e.preventDefault();
  Synth.ensureRunning();
  readSteerTouch(e.clientX, e.clientY);
  const onMove = ev => readSteerTouch(ev.clientX, ev.clientY);
  const onUp = () => {
    clearSteerTouch();
    window.removeEventListener('mousemove', onMove);
    window.removeEventListener('mouseup', onUp);
  };
  window.addEventListener('mousemove', onMove);
  window.addEventListener('mouseup', onUp);
});

// ── TOUCH CONTROLS ─────────────────────────────────────────────────────────
// Each .tc-btn has data-code matching a keyboard code. Hold-buttons set K[code]
// while pressed (matches keyboard); tap-buttons fire one-shot logic on press.
document.querySelectorAll('.tc-btn').forEach(btn => {
  const code = btn.dataset.code;
  const isTap = btn.hasAttribute('data-tap');
  const press = (e) => {
    e.preventDefault();
    btn.classList.add('pressed');
    Synth.ensureRunning();
    if (isTap) {
      if (code === 'KeyR') resetPlayer();
      else if (code === 'KeyV') camMode = (camMode + 1) % 7;
      else if (code === 'KeyM') Synth.setMute(!Synth.isMuted());
    } else {
      K[code] = true;
    }
  };
  const release = (e) => {
    if (e) e.preventDefault();
    btn.classList.remove('pressed');
    if (!isTap) K[code] = false;
  };
  btn.addEventListener('touchstart', press, { passive: false });
  btn.addEventListener('touchend', release, { passive: false });
  btn.addEventListener('touchcancel', release, { passive: false });
  btn.addEventListener('mousedown', press);
  btn.addEventListener('mouseup', release);
  btn.addEventListener('mouseleave', release);
  // Block context menu on long-press
  btn.addEventListener('contextmenu', e => e.preventDefault());
});

function resetPlayer() {
  // Manual respawn costs 5 levels (floor 1)
  applyTierMaybeMorph(player, Math.max(1, player.level - 5));
  respawnCar(player);
  updateBadges();
  Synth.respawn();
}

// ── CAMERA STATE ───────────────────────────────────────────────────────────
const camPos = new THREE.Vector3(0, 9, -44);
const camLook = new THREE.Vector3(0, 1, -32);

// ── MAIN LOOP ──────────────────────────────────────────────────────────────
const MAX_FORCE = 8500;
const MAX_STEER = 0.47;

let prevTime = performance.now();

// ── GAMEPAD ────────────────────────────────────────────────────────────────
// Web Gamepad API: any Bluetooth/USB controller paired at OS level shows up
// here automatically. Mappings follow Xbox/standard layout. Polled each frame.
const G = { gas: false, brake: false, shoot: false, jump: false,
            steer: null, cam: false, mute: false, reset: false,
            prevCam: false, prevMute: false, prevReset: false };

function pollGamepad() {
  const list = navigator.getGamepads ? navigator.getGamepads() : [];
  let gp = null;
  for (const g of list) if (g) { gp = g; break; }
  if (!gp) {
    G.gas = G.brake = G.shoot = G.jump = false;
    G.steer = null;
    return;
  }
  const sx = gp.axes[0] || 0;
  G.steer = Math.abs(sx) > 0.10 ? sx : null;
  // Standard mapping: 0=A 1=B 2=X 3=Y 4=LB 5=RB 6=LT 7=RT 8=Back 9=Start
  G.gas    = (gp.buttons[7]?.value || 0) > 0.1 || gp.buttons[0]?.pressed;
  G.brake  = (gp.buttons[6]?.value || 0) > 0.1 || gp.buttons[1]?.pressed;
  G.shoot  = !!gp.buttons[5]?.pressed;
  G.jump   = !!gp.buttons[2]?.pressed;
  // One-shot buttons (camera/mute/reset) — fire on press edge
  const cam = !!gp.buttons[3]?.pressed;
  if (cam && !G.prevCam) camMode = (camMode + 1) % 7;
  G.prevCam = cam;
  const reset = !!gp.buttons[9]?.pressed;
  if (reset && !G.prevReset) resetPlayer();
  G.prevReset = reset;
  const mute = !!gp.buttons[8]?.pressed;
  if (mute && !G.prevMute) Synth.setMute(!Synth.isMuted());
  G.prevMute = mute;
  Synth.ensureRunning();
}

// Per-car hill state — used to detect peak crossings for the launch effect.
const hillState = new WeakMap();
function applyHillJump(car) {
  const cp = car.chassis.position;
  const hHere = hillHeightAt(cp.x, cp.z);
  if (hHere < 0.05) {
    hillState.set(car, { prevH: 0, prevSlope: 0 });
    return;
  }
  const fwdL = new CANNON.Vec3(1, 0, 0);
  const fwdW = new CANNON.Vec3();
  car.chassis.quaternion.vmult(fwdL, fwdW);
  const dist = 1.6;
  const hAhead = hillHeightAt(cp.x + fwdW.x * dist, cp.z + fwdW.z * dist);
  const slope = (hAhead - hHere) / dist;

  const v = car.chassis.velocity;
  const fwdSpeed = v.x * fwdW.x + v.z * fwdW.z;

  let s = hillState.get(car);
  if (!s) { s = { prevSlope: 0 }; hillState.set(car, s); }

  // Peak-crossing jump impulse REMOVED — no cars fly off hill peaks now.
  s.prevSlope = slope;
}

// Player stuck detection — flips, falls, or held against an obstacle for too long
const respawnHintEl = document.getElementById('respawn-hint');
let playerStuckTime = 0;
function updateStuckHint(dt) {
  const upLocal = new CANNON.Vec3(0, 1, 0);
  const upWorld = new CANNON.Vec3();
  player.chassis.quaternion.vmult(upLocal, upWorld);
  const flipped  = upWorld.y < 0.35;
  const fellOut  = player.chassis.position.y < -3;
  const v = player.chassis.velocity;
  const slow = Math.sqrt(v.x*v.x + v.y*v.y + v.z*v.z) < 0.6;
  const wantsToMove = K['KeyW'] || K['ArrowUp'] || K['KeyS'] || K['ArrowDown']
                      || (touchSteer !== null) || K['KeyQ'];
  const stalled = slow && wantsToMove;

  if (flipped || fellOut || stalled) playerStuckTime += dt;
  else playerStuckTime = 0;

  const show = flipped || fellOut || playerStuckTime > 1.6;
  respawnHintEl.classList.toggle('show', show);
}

function loop() {
  requestAnimationFrame(loop);

  const now = performance.now();
  const dt = Math.min((now - prevTime) / 1000, 0.05);
  prevTime = now;

  // Inspector modal is open → freeze game logic. Skip input, physics, AI.
  if (gamePaused) return;

  // ── Gamepad polling (BT/USB) ──────────────────────────────────────────
  pollGamepad();

  // ── Player input ──────────────────────────────────────────────────────
  const v = player.vehicle;
  let eng = 0, steer = 0;

  // On mobile / touch, holding STEER (slider), SHOOT, or DRIFT implies GAS so
  // one finger is enough. Gamepad gas works the same. Brake wins.
  const touchAssist = document.body.classList.contains('touch');
  const touchActiveDrive = touchAssist && (touchSteer !== null || K['KeyQ']);
  const wantGas = K['ArrowUp'] || K['KeyW'] || G.gas || touchActiveDrive;
  if (wantGas) {
    eng = MAX_FORCE;
  }
  // Reverse / brake: full backwards force (= as quick as forward) once the
  // car is at low speed or already going backwards. While still rolling
  // forward, slam a hard reverse to brake AND skid.
  const brakeHeld = K['ArrowDown'] || K['KeyS'] || G.brake;
  let brakeSkid = false;       // signal handbrake-style rear skid + tail flash
  if (brakeHeld) {
    const vel = player.chassis.velocity;
    const fwdL = new CANNON.Vec3(1, 0, 0);
    const fwdW = new CANNON.Vec3();
    player.chassis.quaternion.vmult(fwdL, fwdW);
    const fwdSpeed = vel.x * fwdW.x + vel.z * fwdW.z;
    if (fwdSpeed > 1.5) {
      eng = -MAX_FORCE;        // hard brake while moving forward → skid
      brakeSkid = true;
    } else {
      eng = -MAX_FORCE;        // full reverse acceleration once stopped
    }
  }
  // Steer: gamepad analog wins, then touch slider, then keyboard
  const analogSteer = (G.steer !== null) ? G.steer
                    : (touchAssist && touchSteer !== null) ? touchSteer : null;
  if (analogSteer !== null) {
    steer = -analogSteer * MAX_STEER;
  } else {
    if (K['ArrowLeft']  || K['KeyA']) steer =  MAX_STEER;
    if (K['ArrowRight'] || K['KeyD']) steer = -MAX_STEER;
  }

  // ── E key: police J-turn — smooth 180° spin (~600 ms) with rear-wheel
  // handbrake so it reads as a drift, not a teleport. Velocity is
  // preserved so the car keeps moving in the same world direction.
  if ((K['KeyE'] || G.jump) && now - lastJTurn > 1200 && !jturnState) {
    const fromQ = new CANNON.Quaternion().copy(player.chassis.quaternion);
    const rot180 = new CANNON.Quaternion();
    rot180.setFromEuler(0, Math.PI, 0);
    const toQ = new CANNON.Quaternion();
    rot180.mult(fromQ, toQ);
    jturnState = { fromQ, toQ, t0: now, dur: 600 };
    lastJTurn = now;
  }
  // Animate active J-turn — slerp the chassis quaternion frame-by-frame.
  if (jturnState) {
    const tRaw = Math.min(1, (now - jturnState.t0) / jturnState.dur);
    const t = tRaw < 0.5 ? 2*tRaw*tRaw : 1 - Math.pow(-2*tRaw + 2, 2)/2;
    // Slerp via three.js (cannon's quaternion API doesn't have a clean slerp).
    const fromT = new THREE.Quaternion(
      jturnState.fromQ.x, jturnState.fromQ.y, jturnState.fromQ.z, jturnState.fromQ.w);
    const toT = new THREE.Quaternion(
      jturnState.toQ.x, jturnState.toQ.y, jturnState.toQ.z, jturnState.toQ.w);
    fromT.slerp(toT, t);
    player.chassis.quaternion.set(fromT.x, fromT.y, fromT.z, fromT.w);
    player.chassis.angularVelocity.set(0, 0, 0);
    if (tRaw >= 1) jturnState = null;
  }

  // Turn-signal blink — 2 cycles/sec (4 Hz toggle). Dim at idle, bright
  // flashing on the side currently being steered. (steer > 0 = left.)
  if (player.turnSignals && (player.turnSignals.left || player.turnSignals.right)) {
    const blinkOn = (Math.floor(now / 1000 * 4) % 2) === 0;
    const dim = 0x884400, bright = 0xff8c00, off = 0x331100;
    const dz = MAX_STEER * 0.05;
    let lc = dim, rc = dim;
    if (steer > dz)      lc = blinkOn ? bright : off;
    else if (steer < -dz) rc = blinkOn ? bright : off;
    if (player.turnSignals.left)  player.turnSignals.left.material.color.setHex(lc);
    if (player.turnSignals.right) player.turnSignals.right.material.color.setHex(rc);
  }

  // 4WD — distribute torque so the chassis doesn't rear up under hard accel
  const ePer = eng / 2;
  v.applyEngineForce(ePer, 0);
  v.applyEngineForce(ePer, 1);
  v.applyEngineForce(ePer, 2);
  v.applyEngineForce(ePer, 3);

  v.setSteeringValue(steer, 0);
  v.setSteeringValue(steer, 1);

  // Space = handbrake. Brake key while still moving forward also locks
  // the rear wheels for a tail-out skid.
  const hb = (K['Space'] || (touchAssist && touchDrifting) || brakeSkid || jturnState) ? 85 : 0;
  v.setBrake(0,  0);
  v.setBrake(0,  1);
  v.setBrake(hb, 2);
  v.setBrake(hb, 3);

  // Tail-lights: dim red by default, bright red on brake/reverse intent.
  if (player.tailMat) {
    player.tailMat.color.setHex(brakeHeld ? 0xff2200 : 0x660000);
  }

  // ── Shoot — fires at the Popcorn melody's tempo (8th=204ms, 16ths=102ms)
  if ((K['KeyQ'] || G.shoot) && now >= nextShotTime) {
    const dt = shoot(player);
    nextShotTime = now + (dt || 200);
  }

  // ── Engine sound (track player speed)
  Synth.setEngine(Math.sqrt(player.chassis.velocity.x ** 2 + player.chassis.velocity.z ** 2));

  // ── Mid-air auto-leveling — when no wheel is in contact, gently torque
  // the chassis upright so the car comes down on all four wheels.
  {
    const inAir = !player.vehicle.wheelInfos.some(w => w.isInContact);
    if (inAir) {
      const upL = new CANNON.Vec3(0, 1, 0);
      const upW = new CANNON.Vec3();
      player.chassis.quaternion.vmult(upL, upW);
      const target = new CANNON.Vec3(0, 1, 0);
      const axis = new CANNON.Vec3();
      upW.cross(target, axis);
      const k = 110;
      player.chassis.applyTorque(new CANNON.Vec3(axis.x * k, axis.y * k, axis.z * k));
      // Bleed angular spin so it doesn't tumble
      const av = player.chassis.angularVelocity;
      av.x *= 0.94; av.y *= 0.94; av.z *= 0.94;
    }
  }

  // ── Auto-righting only (jump removed per request) ─────────────────────
  // Continuous gentle torque so a tipped-over car rolls back upright on
  // its own — no manual jump key.
  {
    const upL = new CANNON.Vec3(0, 1, 0);
    const upW = new CANNON.Vec3();
    player.chassis.quaternion.vmult(upL, upW);
    if (upW.y < 0.55) {
      const target = new CANNON.Vec3(0, 1, 0);
      const axis = new CANNON.Vec3();
      upW.cross(target, axis);
      const k = 70;
      player.chassis.applyTorque(new CANNON.Vec3(axis.x * k, axis.y * k, axis.z * k));
    }
  }

  // ── AI ────────────────────────────────────────────────────────────────
  aiCars.forEach((car, i) => tickAI(car, aiState[i], dt, now));

  // ── Pac-man wrap: any car that drives off one edge is teleported to the
  // opposite edge. Spawn a local sparkle flash at the exit point AND the
  // entry point so the player reads it as "popped through a portal".
  for (const c of allCars) {
    const pos = c.chassis.position;
    const exitX = pos.x, exitZ = pos.z;
    let wrapped = false;
    if (pos.x >  A) { pos.x -= 2 * A; wrapped = true; }
    else if (pos.x < -A) { pos.x += 2 * A; wrapped = true; }
    if (pos.z >  A) { pos.z -= 2 * A; wrapped = true; }
    else if (pos.z < -A) { pos.z += 2 * A; wrapped = true; }
    if (wrapped) {
      spawnWrapFlash(exitX, pos.y, exitZ, now);   // where it left
      spawnWrapFlash(pos.x,  pos.y, pos.z,  now); // where it arrived
    }
  }
  tickFlashes(now);

  // ── Anti-launch: clamp upward velocity so collisions don't flip cars
  // into orbit. SKIPPED for any car flagged "rammed" by the bowling-ball
  // hit so the ramp-launch effect can actually play out.
  for (const c of allCars) {
    const ramming = c._rammedUntil && c._rammedUntil > now;
    if (!ramming && c.chassis.velocity.y > 6) c.chassis.velocity.y = 6;
    // Angular clamp always applies — keeps spins in check.
    const av = c.chassis.angularVelocity;
    const max = 8;
    if (av.x >  max) av.x =  max; if (av.x < -max) av.x = -max;
    if (av.y >  max) av.y =  max; if (av.y < -max) av.y = -max;
    if (av.z >  max) av.z =  max; if (av.z < -max) av.z = -max;
  }

  // ── Bowling-ball: save player velocity right before the physics step.
  // If a high-speed ram fires during the step, we restore the saved
  // velocity afterwards — player ploughs through unaffected.
  const _preStepVel = (player.chassis.velocity.lengthSquared() > RAM_MS * RAM_MS)
    ? new CANNON.Vec3().copy(player.chassis.velocity) : null;

  // ── Physics step ──────────────────────────────────────────────────────
  world.step(1 / 60, dt, 3);
  if (_ramHitThisFrame && _preStepVel) {
    player.chassis.velocity.copy(_preStepVel);
  }
  _ramHitThisFrame = false;
  updateProjectiles(dt);
  updateStuckHint(dt);
  for (const c of allCars) applyHillJump(c);

  // ── Sync visuals — cars are physically on the flat floor.  We lift the
  // visual to whichever is higher: the actual chassis Y (when the car is
  // mid-jump above the hill) or the hill profile.  This way the car rides
  // the hill smoothly going up/over, but real airtime above the hill still
  // shows as the car flying.
  for (const car of allCars) {
    const cp = car.chassis.position;
    const hillH = hillHeightAt(cp.x, cp.z);
    const baseRide = 0.7;
    const lift = Math.max(0, (hillH + baseRide) - cp.y);
    car.group.position.copy(cp);
    car.group.position.y += lift;
    car.group.quaternion.copy(car.chassis.quaternion);
    car.vehicle.wheelInfos.forEach((info, i) => {
      car.vehicle.updateWheelTransform(i);
      car.wheels[i].position.copy(info.worldTransform.position);
      car.wheels[i].position.y += lift;
      car.wheels[i].quaternion.copy(info.worldTransform.quaternion);
    });
    if (car.badge) {
      car.badge.sprite.position.set(cp.x, cp.y + 2.6 + lift, cp.z);
    }
  }
  for (const { body, mesh } of dynamics) {
    mesh.position.copy(body.position);
    mesh.quaternion.copy(body.quaternion);
  }
  for (const b of dynBuildings) {
    b.mesh.position.copy(b.body.position);
    b.mesh.quaternion.copy(b.body.quaternion);
    b.roof.position.set(b.body.position.x, b.body.position.y + b.roofYLocal, b.body.position.z);
  }

  // Pac-man mirrors track every car at 8 surrounding tiles.
  syncShadows();
  // Spectator-cam tuning panel auto-shows / hides with cam mode.
  refreshSpecTuneVisibility();

  // ── Camera (V cycles 6 modes) ─────────────────────────────────────────
  // 0 chase | 1 chase-close | 2 below-floor | 3 front-left | 4 front-right
  // 5 bird's-eye top-down (map rotates with player heading)
  const cp   = player.chassis.position;
  const cq   = player.chassis.quaternion;
  // Visual y matches the sync above (max of physics y vs hill ride height)
  const cHillH = hillHeightAt(cp.x, cp.z);
  const cpY    = Math.max(cp.y, cHillH + 0.7);

  // Bird's-eye flips the sky to floor grey so the horizon disappears
  // and the world reads as a flat tabletop. All other modes use sky.
  scene.background = (camMode === 5) ? FLAT_BG : SKY_BG;

  if (camMode === 6) {
    // Spectator: fixed camera viewing the whole arena. Height + distance
    // tuned live via the on-screen panel (and persisted in localStorage).
    camera.up.set(0, 1, 0);
    camPos.lerp(new THREE.Vector3(0, specCam.height, specCam.dist), 0.10);
    camLook.lerp(new THREE.Vector3(0, 0, 0), 0.10);
    camera.position.copy(camPos);
    camera.lookAt(camLook);
  } else if (camMode === 5) {
    // Top-down. Camera high above; player forward = screen up.
    const fwdL = new CANNON.Vec3(1, 0, 0);
    const fwdW = new CANNON.Vec3();
    cq.vmult(fwdL, fwdW);
    const ALT = birdsEyeAlt;
    camPos.lerp(new THREE.Vector3(cp.x, cpY + ALT, cp.z), 0.15);
    camLook.lerp(new THREE.Vector3(cp.x, cpY, cp.z), 0.20);
    camera.position.copy(camPos);
    // Re-orient camera so player heading maps to screen up
    const upX = fwdW.x, upZ = fwdW.z;
    const len = Math.hypot(upX, upZ) || 1;
    camera.up.set(upX / len, 0, upZ / len);
    camera.lookAt(camLook);
  } else {
    camera.up.set(0, 1, 0);                // restore default up

    let localOff = new CANNON.Vec3(...camOff[camMode]);

    const worldOff = new CANNON.Vec3();
    cq.vmult(localOff, worldOff);

    const lerpK = camMode === 0 ? 0.09 : 0.18;
    camPos.lerp(
      new THREE.Vector3(cp.x + worldOff.x, cpY + worldOff.y, cp.z + worldOff.z),
      lerpK
    );
    camLook.lerp(new THREE.Vector3(cp.x, cpY + 0.7, cp.z), lerpK + 0.04);

    camera.position.copy(camPos);
    camera.lookAt(camLook);
  }

  // ── HUD ───────────────────────────────────────────────────────────────
  const vel = player.chassis.velocity;
  const kmh = Math.round(Math.sqrt(vel.x*vel.x + vel.y*vel.y + vel.z*vel.z) * 3.6);
  document.getElementById('spd').textContent = kmh;

  // ── Morph tick: lerp the player's design over the morph duration. ───
  if (morphState) {
    const tRaw = Math.min(1, (now - morphState.t0) / morphState.dur);
    const t = tRaw < 0.5 ? 2*tRaw*tRaw : 1 - Math.pow(-2*tRaw + 2, 2)/2;  // ease in-out
    player.design = lerpDesign(morphState.from, morphState.to, t);
    applyDesignVisuals(player);
    if (tRaw >= 1) {
      player.design = morphState.to;
      applyDesignVisuals(player);
      rebuildPlayerPreview();
      morphState = null;
    }
  }

  renderer.render(scene, camera);

  // ── Frozen iso preview (top-right, always on) — orthographic 3/4 hero
  // shot of the player's CURRENT design. Camera sits front-LEFT of car
  // (so the car FACES LEFT in the image — windshield + headlights point
  // toward the left edge of the inset). Background is suppressed so the
  // car floats over the game without a square sky tile behind it.
  // Skipped on touch devices so it doesn't crowd a small mobile viewport.
  if (!document.body.classList.contains('touch')) {
    const dpr = renderer.getPixelRatio();
    const W = renderer.domElement.width;
    const H = renderer.domElement.height;
    // Wider-than-tall inset so the car silhouette (4-5m long, ~1.5m tall)
    // fits without empty rails of sky on the sides.
    const cssW = Math.min(320, Math.floor(window.innerWidth / 2.6));
    const cssH = Math.floor(cssW * 0.62);
    const w = Math.floor(cssW * dpr), h = Math.floor(cssH * dpr);
    const margin = Math.floor(14 * dpr);
    const x = W - w - margin;
    const y = H - h - margin;

    // Match the ortho frustum to the inset aspect so the car keeps its
    // real proportions (no vertical stretch).
    const aspect = w / h;
    const halfH = 1.9;                       // ~3.8 vertical world units fit
    const halfW = halfH * aspect;
    miniCam.left  = -halfW; miniCam.right =  halfW;
    miniCam.top   =  halfH; miniCam.bottom = -halfH;
    // Camera at front-left of the car. +X is forward; -Z is the left side.
    miniCam.position.set(6, PREVIEW_Y + 4.0, -6);
    miniCam.lookAt(0, PREVIEW_Y + 0.4, 0);
    miniCam.updateProjectionMatrix();

    // Suppress the scene background so the inset is transparent — viewer
    // sees the game underneath, with only the car overlaid on top.
    const savedBg = scene.background;
    scene.background = null;

    renderer.autoClear = false;
    renderer.setScissorTest(true);
    renderer.setViewport(x, y, w, h);
    renderer.setScissor(x, y, w, h);
    renderer.clearDepth();
    renderer.render(scene, miniCam);
    renderer.setScissorTest(false);
    renderer.autoClear = true;
    renderer.setViewport(0, 0, W, H);

    scene.background = savedBg;
  }
}

loop();
</script>
</body>
</html>
